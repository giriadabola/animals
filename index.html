    <script>
        // Forçar limpeza de cache e service workers se houver atualização
        (async function() {
            const VERSION = 'v1.0.72';
            if (localStorage.getItem('app_cache_version') !== VERSION) {
                try {
                    if ('serviceWorker' in navigator) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (let reg of regs) {
                            await reg.unregister();
                        }
                    }
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        for (let key of keys) {
                            await caches.delete(key);
                        }
                    }
                    localStorage.setItem('app_cache_version', VERSION);
                    window.location.reload();
                } catch (e) {
                    console.error("Erro ao limpar cache:", e);
                }
            }
        })();
    </script>
    <script>
        window.addEventListener('error', function(e) {
            const loadMsg = document.getElementById('loading-message');
            if (loadMsg) {
                loadMsg.innerHTML = "Erro no Script: " + e.message + "<br><small>" + e.filename + ":" + e.lineno + "</small>";
                loadMsg.style.color = "#f87171";
            }
        });
        window.addEventListener('unhandledrejection', function(e) {
            const loadMsg = document.getElementById('loading-message');
            if (loadMsg) {
                loadMsg.innerHTML = "Erro de Promessa: " + e.reason + "<br><small>" + (e.reason && e.reason.stack ? e.reason.stack : '') + "</small>";
                loadMsg.style.color = "#f87171";
            }
        });
    </script>

    <script type="module">
        import { db, auth } from "./js/firebase-config.js?v=5";
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            console.log("AUTH STATE: Estado de autenticação recebido. Utilizador:", user ? (user.email || user.uid) : "Anónimo");
        });

        let allAnimals = [];
        const mainLayout = document.getElementById('mainLayout');
        const searchInput = document.getElementById('searchInput');
        const searchResultsContainer = document.getElementById('searchResults');
        const loadingMessage = document.getElementById('loading-message');
        const categoriesContainer = document.getElementById('categories-list');

        const categoryIcons = {
            Mamiferos: '<i class="fa-solid fa-paw"></i>',
            Aves: '<i class="fa-solid fa-dove"></i>',
            Peixes: '<i class="fa-solid fa-fish"></i>',
            Moluscos: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 15c0-1.66-1.34-3-3-3H9c-1.66 0-3-1.34-3-3s1.34-3 3-3h7c1.66 0 3-1.34 3-3s-1.34-3-3-3h-4a5 5 0 0 0-5 5v.2c-1.8.4-3 2-3 3.8 0 2.2 1.8 4 4 4h10c1.1 0 2 .9 2 2s-.9 2-2 2H4v2h12c2.8 0 5-2.2 5-5Zm-3-12a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-7 6c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1Z"/></svg>',
            Crustaceos: '<i class="fa-solid fa-shrimp"></i>',
            Aracnideos: '<i class="fa-solid fa-spider"></i>',
            Vermes: '<i class="fa-solid fa-worm"></i>',
            Repteis: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.5 7.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5ZM21 9c0 1.93-1.57 3.5-3.5 3.5H9c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5h7.5c.83 0 1.5-.67 1.5-1.5S17.33 5 16.5 5h-10A4.5 4.5 0 0 0 2 9.5 4.5 4.5 0 0 0 6.5 14h10c2.48 0 4.5-2.02 4.5-4.5V9ZM6.5 16A6.5 6.5 0 0 1 0 9.5V11a7.5 7.5 0 0 0 7.5 7.5H19c1.93 0 3.5-1.57 3.5-3.5v-1c0 .83-.67 1.5-1.5 1.5H6.5Z"/></svg>',
            Anfibios: '<i class="fa-solid fa-frog"></i>',
            Insetos: '<i class="fa-solid fa-bug"></i>',
            Microscopicos: '<i class="fa-solid fa-microscope"></i>',
            Extintos: '<i class="fa-solid fa-bone"></i>'
        };

        // Helpers de compatibilidade de categorias (Suporte a String e Map)
        function getFirstActiveCategory(categoria) {
            if (typeof categoria === 'string') return categoria;
            if (categoria && typeof categoria === 'object') {
                const active = Object.keys(categoria).filter(k => categoria[k] === true);
                return active[0] || '';
            }
            return '';
        }

        function formatCategoryDisplay(categoria) {
            if (typeof categoria === 'string') {
                return translateCategory(categoria);
            }
            if (categoria && typeof categoria === 'object') {
                const active = Object.keys(categoria)
                    .filter(k => categoria[k] === true)
                    .map(translateCategory);
                return active.join(', ');
            }
            return '';
        }
        
        function translateCategory(cat) {
            const translations = {
                'Mamiferos': 'Mamíferos',
                'Aves': 'Aves',
                'Peixes': 'Peixes',
                'Moluscos': 'Moluscos',
                'Crustaceos': 'Crustáceos',
                'Aracnideos': 'Aracnídeos',
                'Vermes': 'Vermes',
                'Repteis': 'Répteis',
                'Anfibios': 'Anfíbios',
                'Insetos': 'Insetos',
                'Microscopicos': 'Microscópicos',
                'Extintos': 'Extintos'
            };
            return translations[cat] || cat;
        }

        async function fetchAllAnimals() {
            console.log("fetchAllAnimals: A iniciar carregamento dos animais do Firestore...");
            
            // Teste de conectividade rápida para detetar bloqueios de AdBlocker/Brave Shields
            try {
                console.log("Teste de Conectividade: A tentar fazer fetch direto ao Firestore...");
                const testRes = await fetch("https://firestore.googleapis.com/v1/projects/animals-1cb2d/databases/(default)/documents/animais", { method: 'GET', mode: 'cors' });
                console.log("Teste de Conectividade: Ligação física OK! O servidor respondeu com status:", testRes.status);
            } catch (err) {
                console.error("TESTE DE CONECTIVIDADE FALHOU! O browser ou uma extensão (AdBlock/Proteção) está a bloquear ligações ao Firestore.", err);
            }

            try {
                console.log("fetchAllAnimals: A chamar getDocs(collection(db, 'animais'))...");
                const querySnapshot = await getDocs(collection(db, "animais"));
                console.log("fetchAllAnimals: getDocs concluído com sucesso. Registos obtidos:", querySnapshot.size);
                querySnapshot.forEach((doc) => {
                    allAnimals.push({ id: doc.id, ...doc.data() });
                });
                loadingMessage.style.display = 'none';
                categoriesContainer.style.display = 'grid';
                console.log("fetchAllAnimals: A popular categorias...");
                populateCategories();
                console.log("fetchAllAnimals: A popular listas de sobrevivência...");
                populateSurvivalLists();
                console.log("fetchAllAnimals: A ocultar overlay de loading...");
                hideLoadingOverlay();
            } catch (error) {
                console.error("Erro ao carregar animais do Firestore:", error);
                loadingMessage.textContent = "Não foi possível carregar os animais.";
                hideLoadingOverlay();
            }
        }

        function populateCategories() {
            categoriesContainer.innerHTML = '';
            for (const [name, iconHtml] of Object.entries(categoryIcons)) {
                const categoryLink = document.createElement('a');
                categoryLink.className = 'category-link';
                categoryLink.href = `categories.html?category=${name}`;
                categoryLink.innerHTML = `
                    <span class="category-emoji">${iconHtml}</span>
                    <span>${name}</span>
                `;
                categoriesContainer.appendChild(categoryLink);
            }
        }

        async function populateSurvivalLists() {
            const wrapper = document.getElementById('dynamic-lists-wrapper');
            if (!wrapper) return;
            wrapper.innerHTML = '';

            let order = ["pesquisa-globo", "explorar-biomas", "estrategia-alimento", "acasalamento", "zona-climatica", "categoria", "familia", "estatisticas"];
            let subStatsOrder = ["mais-velozes", "mais-vida-util", "mais-altos", "mais-pesados", "mais-largo", "mais-espesso", "maior-envergadura", "gestacao-longa", "mais-crias", "mais-longos", "forca-mordida", "maior-populacao"];
            let active = {
                "pesquisa-globo": true,
                "explorar-biomas": true,
                "estrategia-alimento": true,
                "acasalamento": false,
                "zona-climatica": false,
                "categoria": false,
                "familia": false,
                "estatisticas": true,
                "mais-velozes": false,
                "mais-vida-util": false,
                "mais-altos": false,
                "mais-pesados": false,
                "mais-largo": false,
                "mais-espesso": false,
                "maior-envergadura": false,
                "gestacao-longa": false,
                "mais-crias": false,
                "mais-longos": false,
                "forca-mordida": false,
                "maior-populacao": false
            };
            let cardLimits = {
                "acasalamento": 12,
                "categoria": 12,
                "familia": 12
            };

            try {
                const settingsSnap = await getDoc(doc(db, "settings", "index-lists"));
                if (settingsSnap.exists()) {
                    const data = settingsSnap.data();
                    if (data.order && Array.isArray(data.order)) {
                        order = data.order;
                    }
                    if (data.subStatsOrder && Array.isArray(data.subStatsOrder)) {
                        subStatsOrder = data.subStatsOrder;
                    }
                    if (data.active) {
                        active = data.active;
                    } else {
                        Object.keys(active).forEach(key => {
                            if (key in data) {
                                active[key] = !!data[key];
                            }
                        });
                    }
                    if (data.cardLimits) {
                        cardLimits = data.cardLimits;
                    }
                }
            } catch (err) {
                console.error("Erro ao carregar settings do index:", err);
            }

            function extractNumericMetric(details, searchKeys, exactMatch = false) {
                const item = details.find(d => {
                    if (!d.tipo) return false;
                    const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                    if (exactMatch) {
                        return searchKeys.some(key => normalized === key);
                    }
                    return searchKeys.every(key => normalized.includes(key));
                });
                if (!item) return null;
                const valStr = item.valor || item.valorMin || '';
                if (!valStr) return null;
                const cleanVal = valStr.replace(',', '.');
                const num = parseFloat(cleanVal.replace(/[^0-9.]/g, ''));
                if (isNaN(num)) return null;

                const unit = (item.unidade || '').toLowerCase().trim();
                let normalizedValue = num;

                // Height / Length / Width / Thickness / Wingspan / Length normalization (base: cm)
                if (searchKeys.includes('altura') || searchKeys.includes('largura') || searchKeys.includes('espessura') || searchKeys.includes('envergadura') || searchKeys.includes('comprimento')) {
                    if (unit === 'm' || unit === 'metro' || unit === 'metros') {
                        normalizedValue = num * 100;
                    } else if (unit === 'mm' || unit === 'milimetro' || unit === 'milimetros') {
                        normalizedValue = num / 10;
                    }
                }
                // Weight normalization (base: g)
                else if (searchKeys.includes('peso')) {
                    if (unit === 'kg' || unit === 'quilo' || unit === 'quilos' || unit === 'quilograma' || unit === 'quilogramas') {
                        normalizedValue = num * 1000;
                    } else if (unit === 't' || unit === 'tonelada' || unit === 'toneladas') {
                        normalizedValue = num * 1000000;
                    }
                }

                return {
                    numericValue: normalizedValue,
                    displayValue: `${valStr} ${item.unidade || ''}`.trim()
                };
            }

            const listsConfig = [
                {
                    key: 'estrategia-alimento',
                    title: 'Estratégias Alimentares',
                    tag: 'Estratégia',
                    icon: 'fa-utensils',
                    gradientClass: 'gradient-purple',
                    extract: (animal) => {
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => {
                            if (!d.tipo) return false;
                            const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return normalized.includes('estrategia') && normalized.includes('alimento');
                        });
                        return item?.valor || null;
                    }
                },
                {
                    key: 'acasalamento',
                    title: 'Sistemas de Acasalamento',
                    tag: 'Acasalamento',
                    icon: 'fa-heart',
                    gradientClass: 'gradient-teal',
                    extract: (animal) => {
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => {
                            if (!d.tipo) return false;
                            const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return normalized.includes('acasalamento');
                        });
                        return item?.valor || null;
                    }
                },
                {
                    key: 'zona-climatica',
                    title: 'Zonas Climáticas',
                    tag: 'Clima',
                    icon: 'fa-cloud-sun',
                    gradientClass: 'gradient-cyan',
                    extract: (animal) => {
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => {
                            if (!d.tipo) return false;
                            const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return normalized.includes('climatica') || normalized.includes('clima') || normalized.includes('zona');
                        });
                        return item?.valor || null;
                    }
                },
                {
                    key: 'categoria',
                    title: 'Categorias de Animais',
                    tag: 'Categoria',
                    icon: 'fa-paw',
                    gradientClass: 'gradient-rose',
                    extract: (animal) => getFirstActiveCategory(animal.categoria) || null
                },
                {
                    key: 'familia',
                    title: 'Famílias de Animais',
                    tag: 'Família',
                    icon: 'fa-users',
                    gradientClass: 'gradient-orange',
                    extract: (animal) => animal.familia || null
                },
                {
                    key: 'mais-velozes',
                    title: 'Os Mais Velozes',
                    tag: 'Velocidade',
                    icon: 'fa-bolt',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.geralDetalhada || [], ['velocidade'])
                },
                {
                    key: 'mais-vida-util',
                    title: 'Com mais Vida Útil',
                    tag: 'Longevidade',
                    icon: 'fa-hourglass-half',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.geralDetalhada || [], ['vida', 'util'])
                },
                {
                    key: 'mais-altos',
                    title: 'Os Mais Altos',
                    tag: 'Altura',
                    icon: 'fa-arrows-up-down',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['altura'])
                },
                {
                    key: 'mais-pesados',
                    title: 'Os Mais Pesados',
                    tag: 'Peso',
                    icon: 'fa-weight-hanging',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['peso'], true)
                },
                {
                    key: 'mais-largo',
                    title: 'Mais Largo',
                    tag: 'Largura',
                    icon: 'fa-arrows-left-right',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['largura'])
                },
                {
                    key: 'mais-espesso',
                    title: 'Mais Espesso',
                    tag: 'Espessura',
                    icon: 'fa-ruler-combined',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['espessura'])
                },
                {
                    key: 'maior-envergadura',
                    title: 'Maior Envergadura',
                    tag: 'Envergadura',
                    icon: 'fa-feather',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['envergadura'])
                },
                {
                    key: 'gestacao-longa',
                    title: 'Gestação Mais Longa',
                    tag: 'Gestação',
                    icon: 'fa-baby-carriage',
                    isRanking: true,
                    extractRanking: (animal) => {
                        const items = animal.informacao?.reproducaoDetalhada || [];
                        const item = items.find(d => {
                            if (!d.tipo) return false;
                            const norm = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return norm.includes('gestacao') || norm.includes('incubacao') || norm.includes('gravidez') || norm.includes('periodo de');
                        });
                        if (!item || !item.detalhe) return null;
                        const detailStr = item.detalhe.toLowerCase().trim();
                        const numbers = detailStr.match(/(\d+)/g);
                        if (!numbers) return null;
                        const num = parseFloat(numbers[numbers.length - 1]);
                        let multiplier = 1;
                        if (detailStr.includes('mes') || detailStr.includes('meses')) {
                            multiplier = 30.5;
                        } else if (detailStr.includes('semana') || detailStr.includes('semanas')) {
                            multiplier = 7;
                        } else if (detailStr.includes('ano') || detailStr.includes('anos')) {
                            multiplier = 365;
                        }
                        return {
                            numericValue: num * multiplier,
                            displayValue: item.detalhe
                        };
                    }
                },
                {
                    key: 'mais-crias',
                    title: 'Mais Crias por Ninhada',
                    tag: 'Ninhada',
                    icon: 'fa-fish-fins',
                    isRanking: true,
                    extractRanking: (animal) => {
                        const items = animal.informacao?.reproducaoDetalhada || [];
                        const item = items.find(d => {
                            if (!d.tipo) return false;
                            const norm = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return norm.includes('cria') || norm.includes('filhote');
                        });
                        if (!item || !item.detalhe) return null;
                        const detailStr = item.detalhe.toLowerCase().trim();
                        const numbers = detailStr.match(/(\d+)/g);
                        if (!numbers) return null;
                        const num = parseFloat(numbers[numbers.length - 1]);
                        return {
                            numericValue: num,
                            displayValue: item.detalhe
                        };
                    }
                },
                {
                    key: 'mais-longos',
                    title: 'Os Mais Longos',
                    tag: 'Comprimento',
                    icon: 'fa-ruler-horizontal',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['comprimento'])
                },
                {
                    key: 'forca-mordida',
                    title: 'Força da Mordida',
                    tag: 'Mordida',
                    icon: 'fa-tooth',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.geralDetalhada || [], ['mordida'])
                },
                {
                    key: 'maior-populacao',
                    title: 'Maior População',
                    tag: 'População',
                    icon: 'fa-globe',
                    isRanking: true,
                    extractRanking: (animal) => {
                        const metric = extractNumericMetric(animal.informacao?.geralDetalhada || [], ['populacao']);
                        if (!metric) return null;
                        
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => d.tipo && d.tipo.toLowerCase().includes('populacao'));
                        const unit = (item?.unidade || '').toLowerCase().trim();
                        let factor = 1;
                        if (unit.includes('milhar') || unit.includes('milhares')) factor = 1000;
                        else if (unit.includes('milhao') || unit.includes('milhoes')) factor = 1000000;
                        
                        return {
                            numericValue: metric.numericValue * factor,
                            displayValue: metric.displayValue
                        };
                    }
                }
            ];

            let estatisticasSectionCreated = false;
            let estatisticasContainer = null;
            let encounteredInternal = false;
            const mainElement = document.querySelector('main');

            order.forEach(key => {
                if (!active[key]) {
                    // If sections are inactive, ensure cards are hidden
                    if (key === 'pesquisa-globo' && globeCard) {
                        globeCard.style.display = 'none';
                    }
                    if (key === 'explorar-biomas' && biomaExplorerCard) {
                        biomaExplorerCard.style.display = 'none';
                    }
                    return;
                }

                // Handle the globe search card separately (inside the wrapper)
                if (key === 'pesquisa-globo') {
                    if (globeCard) {
                        globeCard.style.display = 'flex';
                        wrapper.appendChild(globeCard);
                    }
                    return;
                }

                // Handle the biomas explorer card separately (full-width sibling)
                if (key === 'explorar-biomas') {
                    if (biomaExplorerCard) {
                        biomaExplorerCard.style.display = 'flex';
                        if (!encounteredInternal) {
                            mainElement.insertBefore(biomaExplorerCard, mainLayout);
                        } else {
                            mainElement.appendChild(biomaExplorerCard);
                        }
                    }
                    return;
                }

                // Any other key triggers internal layouts inside the 960px container
                encounteredInternal = true;

                if (key === 'estatisticas') {
                    const activeRankings = [];
                    const usedAnimalIds = new Set();
                    subStatsOrder.forEach(subKey => {
                        if (!active[subKey]) return;
                        const config = listsConfig.find(c => c.key === subKey);
                        if (!config) return;

                        const ranked = [];
                        allAnimals.forEach(animal => {
                            const res = config.extractRanking(animal);
                            if (res) {
                                ranked.push({
                                    animal,
                                    numericValue: res.numericValue,
                                    displayValue: res.displayValue
                                });
                            }
                        });

                        if (ranked.length > 0) {
                            ranked.sort((a, b) => b.numericValue - a.numericValue);
                            
                            let selected = ranked[0];
                            for (let i = 0; i < ranked.length; i++) {
                                if (!usedAnimalIds.has(ranked[i].animal.id)) {
                                    selected = ranked[i];
                                    break;
                                }
                            }
                            usedAnimalIds.add(selected.animal.id);

                            activeRankings.push({
                                config,
                                topAnimal: selected.animal,
                                displayValue: selected.displayValue
                            });
                        }
                    });

                    if (activeRankings.length === 0) return;

                    const section = document.createElement('div');
                    section.className = 'lists-section';
                    section.innerHTML = `
                        <h2 class="section-title">Estatísticas</h2>
                        <div class="lists-container" id="estatisticas-container"></div>
                    `;
                    const container = section.querySelector('.lists-container');

                    activeRankings.forEach(item => {
                        const card = document.createElement('a');
                        card.className = 'list-card';
                        card.href = `filtros.html?tipo=${item.config.key}&valor=ranking`;
                        card.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.2), rgba(9, 9, 20, 0.95)), url('${item.topAnimal.imagemUrl}')`;
                        card.style.backgroundPosition = item.topAnimal.imagemObjectPosition || 'center center';
                        
                        card.innerHTML = `
                            <div class="list-card-content">
                                <span class="list-card-tag"><i class="fa-solid ${item.config.icon}"></i> ${item.config.tag}</span>
                                <h3 class="list-card-title">${item.config.title}</h3>
                                <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">${item.topAnimal.nome}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });

                    wrapper.appendChild(section);
                } else {
                    const config = listsConfig.find(c => c.key === key);
                    if (!config) return;

                    const strategyMap = new Map();
                    allAnimals.forEach(animal => {
                        const value = config.extract(animal);
                        if (value && value.trim()) {
                            const cleanValue = value.trim();
                            if (!strategyMap.has(cleanValue) && animal.imagemUrl) {
                                strategyMap.set(cleanValue, {
                                    imagemUrl: animal.imagemUrl,
                                    objectPos: animal.imagemObjectPosition || 'center center'
                                });
                            }
                        }
                    });

                    if (strategyMap.size === 0) return;

                    const maxCards = (cardLimits && cardLimits[key] !== undefined) ? parseInt(cardLimits[key]) : 999;
                    if (maxCards === 0) return;

                    const section = document.createElement('div');
                    section.className = 'lists-section';
                    section.innerHTML = `
                        <h2 class="section-title ${config.gradientClass || 'gradient-purple'}">${config.title}</h2>
                        <div class="lists-container"></div>
                    `;
                    const container = section.querySelector('.lists-container');

                    let renderedCount = 0;
                    for (const [val, data] of strategyMap.entries()) {
                        if (renderedCount >= maxCards) break;

                        const card = document.createElement('a');
                        card.className = 'list-card';
                        card.href = `filtros.html?tipo=${config.key}&valor=${encodeURIComponent(val)}`;
                        card.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.2), rgba(9, 9, 20, 0.95)), url('${data.imagemUrl}')`;
                        card.style.backgroundPosition = data.objectPos;
                        
                        card.innerHTML = `
                            <div class="list-card-content">
                                <span class="list-card-tag"><i class="fa-solid ${config.icon}"></i> ${config.tag}</span>
                                <h3 class="list-card-title">${val}</h3>
                            </div>
                        `;
                        container.appendChild(card);
                        renderedCount++;
                    }

                    if (renderedCount > 0) {
                        wrapper.appendChild(section);
                    }
                }
            });
        }
        
        function displayResults(results) {
            searchResultsContainer.innerHTML = '';
            if (results.length === 0) {
                searchResultsContainer.style.display = 'none';
                if (mainLayout) mainLayout.classList.remove('has-results');
                return;
            }
            results.forEach(animal => {
                const resultElement = document.createElement('a');
                resultElement.className = 'result-item';
                resultElement.href = `animal.html?id=${animal.id}`;
                
                resultElement.innerHTML = `
                    <div class="result-main-info">
                        <img src="${animal.imagemUrl}" alt="Imagem de ${animal.nome}" style="object-position: ${animal.imagemObjectPosition || 'center center'};">
                        <div class="result-text">
                            <span class="nome">${animal.nome}</span>
                            <span class="nome-cientifico">(${animal.nomeCientifico})</span>
                        </div>
                    </div>
                    <div class="result-category">${formatCategoryDisplay(animal.categoria)}</div>
                `;
                searchResultsContainer.appendChild(resultElement);
            });
            searchResultsContainer.style.display = 'block';
            if (mainLayout) mainLayout.classList.add('has-results');
        }

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase().trim();
            if (searchTerm.length === 0) {
                searchResultsContainer.style.display = 'none';
                if (mainLayout) mainLayout.classList.remove('has-results');
                return;
            }
            const filteredAnimals = allAnimals.filter(animal => 
                animal.nome.toLowerCase().includes(searchTerm) || 
                animal.nomeCientifico.toLowerCase().includes(searchTerm)
            );
            displayResults(filteredAnimals);
            if (window.innerWidth > 992 && filteredAnimals.length > 0) {
                mainLayout.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
        
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.search-container') && !event.target.closest('#searchResults')) {
                searchResultsContainer.style.display = 'none';
                if (mainLayout) mainLayout.classList.remove('has-results');
            }
        });
        
        // ===== Globe Country Search Logic =====
        let countriesMap = {};
        const globeCard = document.getElementById('globeSearchCard');
        const globeInput = document.getElementById('globeCountryInput');
        const globeResults = document.getElementById('globeSearchResults');

        async function loadCountriesForGlobe() {
            try {
                const res = await fetch('js/countries.json');
                countriesMap = await res.json();
            } catch (err) {
                console.error("Erro ao carregar countries.json:", err);
            }
        }

        function codeToFlag(code) {
            return code.toUpperCase().replace(/./g, char =>
                String.fromCodePoint(127397 + char.charCodeAt(0))
            );
        }

        function removeAccents(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function handleGlobeSearch() {
            const query = removeAccents(globeInput.value.toLowerCase().trim());
            globeResults.innerHTML = '';

            if (!query) {
                globeResults.classList.remove('active');
                return;
            }

            const matches = [];
            for (const [code, name] of Object.entries(countriesMap)) {
                const normalizedName = removeAccents(name.toLowerCase());
                if (normalizedName.includes(query)) {
                    matches.push({ code, name });
                }
            }

            if (matches.length === 0) {
                globeResults.innerHTML = '<div class="globe-search-no-results">Nenhum país encontrado</div>';
                globeResults.classList.add('active');
                return;
            }

            // Limit to 20 results for performance
            matches.slice(0, 20).forEach(({ code, name }) => {
                const item = document.createElement('a');
                item.className = 'globe-search-result-item';
                item.href = `filtros.html?tipo=pais&valor=${encodeURIComponent(code)}&nome=${encodeURIComponent(name)}`;
                item.innerHTML = `
                    <span class="flag-emoji">${codeToFlag(code)}</span>
                    <span class="country-name">${name}</span>
                    <span class="country-code">${code}</span>
                `;
                globeResults.appendChild(item);
            });

            globeResults.classList.add('active');
        }

        if (globeInput) {
            globeInput.addEventListener('input', handleGlobeSearch);
        }

        // Close globe results on click outside
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.globe-search-wrapper')) {
                globeResults.classList.remove('active');
            }
        });

        // ===== Bioma Explorer Logic =====
        const biomaData = {
            terrestres: [
                { title: 'Floresta tropical', img: 'assets/capas/biomas_capas/01_floresta_tropical.png' },
                { title: 'Floresta temperada', img: 'assets/capas/biomas_capas/02_floresta_temperada.png' },
                { title: 'Floresta boreal / Taiga', img: 'assets/capas/biomas_capas/03_floresta_boreal_taiga.png' },
                { title: 'Savana', img: 'assets/capas/biomas_capas/04_savana.png' },
                { title: 'Pradaria / Campos temperados', img: 'assets/capas/biomas_capas/05_pradaria_campos_temperados.png' },
                { title: 'Estepe', img: 'assets/capas/biomas_capas/06_estepe.png' },
                { title: 'Deserto', img: 'assets/capas/biomas_capas/07_deserto.png' },
                { title: 'Tundra', img: 'assets/capas/biomas_capas/08_tundra.png' },
                { title: 'Chaparral / Matagal mediterrânico', img: 'assets/capas/biomas_capas/09_chaparral_matagal_mediterranico.png' },
                { title: 'Montanha / Alpino', img: 'assets/capas/biomas_capas/10_montanha_alpino.png' },
                { title: 'Polar / Gelo', img: 'assets/capas/biomas_capas/11_polar_gelo.png' }
            ],
            aquaticos: [
                { title: 'Marinho', img: 'assets/capas/biomas_capas/12_marinho.png' },
                { title: 'Oceânico', img: 'assets/capas/biomas_capas/13_oceanico.png' },
                { title: 'Costeiro', img: 'assets/capas/biomas_capas/14_costeiro.png' },
                { title: 'Recife de coral', img: 'assets/capas/biomas_capas/15_recife_de_coral.png' },
                { title: 'Estuário', img: 'assets/capas/biomas_capas/16_estuario.png' },
                { title: 'Manguezal / Mangal', img: 'assets/capas/biomas_capas/17_manguezal_mangal.png' },
                { title: 'Água doce', img: 'assets/capas/biomas_capas/18_agua_doce.png' },
                { title: 'Rio', img: 'assets/capas/biomas_capas/19_rio.png' },
                { title: 'Lago', img: 'assets/capas/biomas_capas/20_lago.png' },
                { title: 'Pântano / Zona húmida', img: 'assets/capas/biomas_capas/21_pantano_zona_humida.png' }
            ],
            transicao: [
                { title: 'Manguezal', img: 'assets/capas/biomas_capas/22_manguezal_entre_terra_e_mar.png', query: 'Manguezal' },
                { title: 'Estuário', img: 'assets/capas/biomas_capas/23_estuario_agua_doce_e_salgada.png', query: 'Estuário' },
                { title: 'Zona húmida', img: 'assets/capas/biomas_capas/24_zona_humida_pantanos_charcos_turfeiras.png', query: 'Pântano' },
                { title: 'Ecossistema urbano', img: 'assets/capas/biomas_capas/25_ecossistema_urbano.png', query: 'Fauna urbana' },
                { title: 'Cavernas', img: 'assets/capas/biomas_capas/26_cavernas.png', query: 'Caverna' }
            ]
        };

        const biomaExplorerCard = document.getElementById('biomaExplorerCard');
        const biomaPreviewTitle = document.getElementById('biomaPreviewTitle');
        const biomaExploreLink = document.getElementById('biomaExploreLink');
        const biomaListPane = document.getElementById('biomaListPane');
        const biomaTabButtons = document.querySelectorAll('.bioma-tab-btn');

        function selectBioma(item) {
            if (biomaExplorerCard) {
                biomaExplorerCard.style.backgroundImage = `url('${item.img}')`;
                biomaExplorerCard.style.setProperty('--bioma-bg-position', item.pos || '78% center');
                biomaExplorerCard.style.setProperty('--bioma-bg-position-mobile', item.mobilePos || '72% center');
            }
            biomaPreviewTitle.textContent = item.title;
            const queryValue = item.query || item.title;
            biomaExploreLink.href = `filtros.html?tipo=bioma&valor=${encodeURIComponent(queryValue)}`;
        }

        function renderBiomaTab(tabKey) {
            biomaListPane.innerHTML = '';
            const items = biomaData[tabKey] || [];
            
            items.forEach((item, index) => {
                const queryValue = item.query || item.title;
                const itemEl = document.createElement('div');
                itemEl.className = `bioma-item ${index === 0 ? 'active' : ''}`;
                itemEl.innerHTML = `
                    <div class="bioma-item-left">
                        <span class="bioma-item-dot"></span>
                        <span class="bioma-item-title">${item.title}</span>
                    </div>
                    <button type="button" class="bioma-item-mobile-link" data-href="filtros.html?tipo=bioma&valor=${encodeURIComponent(queryValue)}">
                        <span>Ver animais deste bioma</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                `;

                const mobileLinkEl = itemEl.querySelector('.bioma-item-mobile-link');
                if (mobileLinkEl) {
                    mobileLinkEl.addEventListener('click', (event) => {
                        event.preventDefault();
                        event.stopPropagation();
                        const href = mobileLinkEl.dataset.href;
                        if (href) {
                            window.location.href = href;
                        }
                    });
                }
                
                itemEl.addEventListener('mouseenter', () => {
                    document.querySelectorAll('.bioma-item').forEach(el => el.classList.remove('active'));
                    itemEl.classList.add('active');
                    selectBioma(item);
                });

                itemEl.addEventListener('click', (event) => {
                    if (event.target.closest('.bioma-item-mobile-link')) return;
                    document.querySelectorAll('.bioma-item').forEach(el => el.classList.remove('active'));
                    itemEl.classList.add('active');
                    selectBioma(item);
                });

                biomaListPane.appendChild(itemEl);
            });

            if (items.length > 0) {
                selectBioma(items[0]);
            }
        }

        biomaTabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                biomaTabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderBiomaTab(btn.dataset.tab);
            });
        });

        // Initialize biomas
        renderBiomaTab('terrestres');

        // Initialize globe search
        loadCountriesForGlobe();

        fetchAllAnimals();
    </script>
    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
