<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandes Projetos - Pesquisa de Animais</title>
    <!-- PWA Config -->
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/logos/favicon.ico">
    <link rel="apple-touch-icon" href="assets/logos/apple-touch-icon.png">
    <meta name="theme-color" content="#0b3022">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Animais">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Global -->
    <link rel="stylesheet" href="css/style.css?v=1.0.1">
    <script>
        window.addEventListener('error', function(e) {
            const loadMsg = document.getElementById('loading-message');
            if (loadMsg) {
                loadMsg.innerHTML = "Erro no Script: " + e.message + "<br><small>" + e.filename + ":" + e.lineno + "</small>";
                loadMsg.style.color = "#f87171";
            }
        });
        window.addEventListener('unhandledrejection', function(e) {
            const loadMsg = document.getElementById('loading-message');
            if (loadMsg) {
                loadMsg.innerHTML = "Erro de Promessa: " + e.reason + "<br><small>" + (e.reason && e.reason.stack ? e.reason.stack : '') + "</small>";
                loadMsg.style.color = "#f87171";
            }
        });
    </script>
</head>
<body>
    <!-- SVG Gradient para ícones do Lucide -->
    <svg style="width:0; height:0; position:absolute;" aria-hidden="true">
        <defs>
            <linearGradient id="aurora-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#818cf8" />
                <stop offset="50%" stop-color="#c084fc" />
                <stop offset="100%" stop-color="#f472b6" />
            </linearGradient>
        </defs>
    </svg>

    <main>
        <section class="hero-section">
            <h1>GRANDES PROJETOS</h1>
        </section>

        <div class="main-layout" id="mainLayout">
            <div class="left-panel">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Pesquise por nome comum ou científico...">
                </div>

                <p id="loading-message">A carregar animais...</p>
                <div class="categories-container" id="categories-list" style="display: none;"></div>
                
                <div id="dynamic-lists-wrapper"></div>
            </div>
            
            <div class="right-panel">
                <div id="searchResults"></div>
            </div>
        </div>
    </main>

    <!-- Componentes e Lógica -->
    <script type="module" src="js/components.js?v=4"></script>
    <script type="module">
        import { db } from "./js/firebase-config.js?v=2";
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let allAnimals = [];
        const mainLayout = document.getElementById('mainLayout');
        const searchInput = document.getElementById('searchInput');
        const searchResultsContainer = document.getElementById('searchResults');
        const loadingMessage = document.getElementById('loading-message');
        const categoriesContainer = document.getElementById('categories-list');

        const categoryIcons = {
            Mamiferos: '<i class="fa-solid fa-paw"></i>',
            Aves: '<i class="fa-solid fa-dove"></i>',
            Peixes: '<i class="fa-solid fa-fish"></i>',
            Moluscos: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 15c0-1.66-1.34-3-3-3H9c-1.66 0-3-1.34-3-3s1.34-3 3-3h7c1.66 0 3-1.34 3-3s-1.34-3-3-3h-4a5 5 0 0 0-5 5v.2c-1.8.4-3 2-3 3.8 0 2.2 1.8 4 4 4h10c1.1 0 2 .9 2 2s-.9 2-2 2H4v2h12c2.8 0 5-2.2 5-5Zm-3-12a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-7 6c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1Z"/></svg>',
            Crustaceos: '<i class="fa-solid fa-shrimp"></i>',
            Aracnideos: '<i class="fa-solid fa-spider"></i>',
            Vermes: '<i class="fa-solid fa-worm"></i>',
            Repteis: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.5 7.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5ZM21 9c0 1.93-1.57 3.5-3.5 3.5H9c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5h7.5c.83 0 1.5-.67 1.5-1.5S17.33 5 16.5 5h-10A4.5 4.5 0 0 0 2 9.5 4.5 4.5 0 0 0 6.5 14h10c2.48 0 4.5-2.02 4.5-4.5V9ZM6.5 16A6.5 6.5 0 0 1 0 9.5V11a7.5 7.5 0 0 0 7.5 7.5H19c1.93 0 3.5-1.57 3.5-3.5v-1c0 .83-.67 1.5-1.5 1.5H6.5Z"/></svg>',
            Anfibios: '<i class="fa-solid fa-frog"></i>',
            Insetos: '<i class="fa-solid fa-bug"></i>',
            Microscopicos: '<i class="fa-solid fa-microscope"></i>',
            Extintos: '<i class="fa-solid fa-bone"></i>'
        };

        async function fetchAllAnimals() {
            try {
                const querySnapshot = await getDocs(collection(db, "animais"));
                querySnapshot.forEach((doc) => {
                    allAnimals.push({ id: doc.id, ...doc.data() });
                });
                loadingMessage.style.display = 'none';
                categoriesContainer.style.display = 'grid';
                populateCategories();
                populateSurvivalLists();
            } catch (error) {
                console.error("Erro ao carregar animais:", error);
                loadingMessage.textContent = "Não foi possível carregar os animais.";
            }
        }

        function populateCategories() {
            categoriesContainer.innerHTML = '';
            for (const [name, iconHtml] of Object.entries(categoryIcons)) {
                const categoryLink = document.createElement('a');
                categoryLink.className = 'category-link';
                categoryLink.href = `categories.html?category=${name}`;
                categoryLink.innerHTML = `
                    <span class="category-emoji">${iconHtml}</span>
                    <span>${name}</span>
                `;
                categoriesContainer.appendChild(categoryLink);
            }
        }

        async function populateSurvivalLists() {
            const wrapper = document.getElementById('dynamic-lists-wrapper');
            if (!wrapper) return;
            wrapper.innerHTML = '';

            let order = ["estrategia-alimento", "acasalamento", "zona-climatica", "categoria", "familia", "estatisticas"];
            let subStatsOrder = ["mais-velozes", "mais-vida-util", "mais-altos", "mais-pesados", "mais-largo", "mais-espesso"];
            let active = {
                "estrategia-alimento": true,
                "acasalamento": false,
                "zona-climatica": false,
                "categoria": false,
                "familia": false,
                "estatisticas": true,
                "mais-velozes": false,
                "mais-vida-util": false,
                "mais-altos": false,
                "mais-pesados": false,
                "mais-largo": false,
                "mais-espesso": false
            };

            try {
                const settingsSnap = await getDoc(doc(db, "settings", "index-lists"));
                if (settingsSnap.exists()) {
                    const data = settingsSnap.data();
                    if (data.order && Array.isArray(data.order)) {
                        order = data.order;
                    }
                    if (data.subStatsOrder && Array.isArray(data.subStatsOrder)) {
                        subStatsOrder = data.subStatsOrder;
                    }
                    if (data.active) {
                        active = data.active;
                    } else {
                        Object.keys(active).forEach(key => {
                            if (key in data) {
                                active[key] = !!data[key];
                            }
                        });
                    }
                }
            } catch (err) {
                console.error("Erro ao carregar settings do index:", err);
            }

            function extractNumericMetric(details, searchKeys, exactMatch = false) {
                const item = details.find(d => {
                    if (!d.tipo) return false;
                    const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                    if (exactMatch) {
                        return searchKeys.some(key => normalized === key);
                    }
                    return searchKeys.every(key => normalized.includes(key));
                });
                if (!item) return null;
                const valStr = item.valor || item.valorMin || '';
                if (!valStr) return null;
                const cleanVal = valStr.replace(',', '.');
                const num = parseFloat(cleanVal.replace(/[^0-9.]/g, ''));
                if (isNaN(num)) return null;

                const unit = (item.unidade || '').toLowerCase().trim();
                let normalizedValue = num;

                // Height / Length / Width / Thickness normalization (base: cm)
                if (searchKeys.includes('altura') || searchKeys.includes('largura') || searchKeys.includes('espessura')) {
                    if (unit === 'm' || unit === 'metro' || unit === 'metros') {
                        normalizedValue = num * 100;
                    } else if (unit === 'mm' || unit === 'milimetro' || unit === 'milimetros') {
                        normalizedValue = num / 10;
                    }
                }
                // Weight normalization (base: g)
                else if (searchKeys.includes('peso')) {
                    if (unit === 'kg' || unit === 'quilo' || unit === 'quilos' || unit === 'quilograma' || unit === 'quilogramas') {
                        normalizedValue = num * 1000;
                    } else if (unit === 't' || unit === 'tonelada' || unit === 'toneladas') {
                        normalizedValue = num * 1000000;
                    }
                }

                return {
                    numericValue: normalizedValue,
                    displayValue: `${valStr} ${item.unidade || ''}`.trim()
                };
            }

            const listsConfig = [
                {
                    key: 'estrategia-alimento',
                    title: 'Estratégias Alimentares',
                    tag: 'Estratégia',
                    icon: 'fa-utensils',
                    gradientClass: 'gradient-purple',
                    extract: (animal) => {
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => {
                            if (!d.tipo) return false;
                            const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return normalized.includes('estrategia') && normalized.includes('alimento');
                        });
                        return item?.valor || null;
                    }
                },
                {
                    key: 'acasalamento',
                    title: 'Sistemas de Acasalamento',
                    tag: 'Acasalamento',
                    icon: 'fa-heart',
                    gradientClass: 'gradient-teal',
                    extract: (animal) => {
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => {
                            if (!d.tipo) return false;
                            const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return normalized.includes('acasalamento');
                        });
                        return item?.valor || null;
                    }
                },
                {
                    key: 'zona-climatica',
                    title: 'Zonas Climáticas',
                    tag: 'Clima',
                    icon: 'fa-cloud-sun',
                    gradientClass: 'gradient-cyan',
                    extract: (animal) => {
                        const details = animal.informacao?.geralDetalhada || [];
                        const item = details.find(d => {
                            if (!d.tipo) return false;
                            const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                            return normalized.includes('climatica') || normalized.includes('clima') || normalized.includes('zona');
                        });
                        return item?.valor || null;
                    }
                },
                {
                    key: 'categoria',
                    title: 'Categorias de Animais',
                    tag: 'Categoria',
                    icon: 'fa-paw',
                    gradientClass: 'gradient-rose',
                    extract: (animal) => animal.categoria || null
                },
                {
                    key: 'familia',
                    title: 'Famílias de Animais',
                    tag: 'Família',
                    icon: 'fa-users',
                    gradientClass: 'gradient-orange',
                    extract: (animal) => animal.familia || null
                },
                {
                    key: 'mais-velozes',
                    title: 'Os Mais Velozes',
                    tag: 'Velocidade',
                    icon: 'fa-bolt',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.geralDetalhada || [], ['velocidade'])
                },
                {
                    key: 'mais-vida-util',
                    title: 'Com mais Vida Útil',
                    tag: 'Longevidade',
                    icon: 'fa-hourglass-half',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.geralDetalhada || [], ['vida', 'util'])
                },
                {
                    key: 'mais-altos',
                    title: 'Os Mais Altos',
                    tag: 'Altura',
                    icon: 'fa-arrows-up-down',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['altura'])
                },
                {
                    key: 'mais-pesados',
                    title: 'Os Mais Pesados',
                    tag: 'Peso',
                    icon: 'fa-weight-hanging',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['peso'], true)
                },
                {
                    key: 'mais-largo',
                    title: 'Mais Largo',
                    tag: 'Largura',
                    icon: 'fa-arrows-left-right',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['largura'])
                },
                {
                    key: 'mais-espesso',
                    title: 'Mais Espesso',
                    tag: 'Espessura',
                    icon: 'fa-ruler-combined',
                    isRanking: true,
                    extractRanking: (animal) => extractNumericMetric(animal.informacao?.dimensoesDetalhadas || [], ['espessura'])
                }
            ];

            let estatisticasSectionCreated = false;
            let estatisticasContainer = null;

            order.forEach(key => {
                if (!active[key]) return;

                if (key === 'estatisticas') {
                    const activeRankings = [];
                    const usedAnimalIds = new Set();
                    subStatsOrder.forEach(subKey => {
                        if (!active[subKey]) return;
                        const config = listsConfig.find(c => c.key === subKey);
                        if (!config) return;

                        const ranked = [];
                        allAnimals.forEach(animal => {
                            const res = config.extractRanking(animal);
                            if (res) {
                                ranked.push({
                                    animal,
                                    numericValue: res.numericValue,
                                    displayValue: res.displayValue
                                });
                            }
                        });

                        if (ranked.length > 0) {
                            ranked.sort((a, b) => b.numericValue - a.numericValue);
                            
                            let selected = ranked[0];
                            for (let i = 0; i < ranked.length; i++) {
                                if (!usedAnimalIds.has(ranked[i].animal.id)) {
                                    selected = ranked[i];
                                    break;
                                }
                            }
                            usedAnimalIds.add(selected.animal.id);

                            activeRankings.push({
                                config,
                                topAnimal: selected.animal,
                                displayValue: selected.displayValue
                            });
                        }
                    });

                    if (activeRankings.length === 0) return;

                    const section = document.createElement('div');
                    section.className = 'lists-section';
                    section.innerHTML = `
                        <h2 class="section-title">Estatísticas</h2>
                        <div class="lists-container" id="estatisticas-container"></div>
                    `;
                    const container = section.querySelector('.lists-container');

                    activeRankings.forEach(item => {
                        const card = document.createElement('a');
                        card.className = 'list-card';
                        card.href = `filtros.html?tipo=${item.config.key}&valor=ranking`;
                        card.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.2), rgba(9, 9, 20, 0.95)), url('${item.topAnimal.imagemUrl}')`;
                        card.style.backgroundPosition = item.topAnimal.imagemObjectPosition || 'center center';
                        
                        card.innerHTML = `
                            <div class="list-card-content">
                                <span class="list-card-tag"><i class="fa-solid ${item.config.icon}"></i> ${item.config.tag}</span>
                                <h3 class="list-card-title">${item.config.title}</h3>
                                <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">${item.topAnimal.nome}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });

                    wrapper.appendChild(section);
                } else {
                    const config = listsConfig.find(c => c.key === key);
                    if (!config) return;

                    const strategyMap = new Map();
                    allAnimals.forEach(animal => {
                        const value = config.extract(animal);
                        if (value && value.trim()) {
                            const cleanValue = value.trim();
                            if (!strategyMap.has(cleanValue) && animal.imagemUrl) {
                                strategyMap.set(cleanValue, {
                                    imagemUrl: animal.imagemUrl,
                                    objectPos: animal.imagemObjectPosition || 'center center'
                                });
                            }
                        }
                    });

                    if (strategyMap.size === 0) return;

                    const section = document.createElement('div');
                    section.className = 'lists-section';
                    section.innerHTML = `
                        <h2 class="section-title ${config.gradientClass || 'gradient-purple'}">${config.title}</h2>
                        <div class="lists-container"></div>
                    `;
                    const container = section.querySelector('.lists-container');

                    for (const [val, data] of strategyMap.entries()) {
                        const card = document.createElement('a');
                        card.className = 'list-card';
                        card.href = `filtros.html?tipo=${config.key}&valor=${encodeURIComponent(val)}`;
                        card.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.2), rgba(9, 9, 20, 0.95)), url('${data.imagemUrl}')`;
                        card.style.backgroundPosition = data.objectPos;
                        
                        card.innerHTML = `
                            <div class="list-card-content">
                                <span class="list-card-tag"><i class="fa-solid ${config.icon}"></i> ${config.tag}</span>
                                <h3 class="list-card-title">${val}</h3>
                            </div>
                        `;
                        container.appendChild(card);
                    }

                    wrapper.appendChild(section);
                }
            });
        }
        
        function displayResults(results) {
            searchResultsContainer.innerHTML = '';
            if (results.length === 0) {
                searchResultsContainer.style.display = 'none';
                if (mainLayout) mainLayout.classList.remove('has-results');
                return;
            }
            results.forEach(animal => {
                const resultElement = document.createElement('a');
                resultElement.className = 'result-item';
                resultElement.href = `animal.html?id=${animal.id}`;
                
                resultElement.innerHTML = `
                    <div class="result-main-info">
                        <img src="${animal.imagemUrl}" alt="Imagem de ${animal.nome}" style="object-position: ${animal.imagemObjectPosition || 'center center'};">
                        <div class="result-text">
                            <span class="nome">${animal.nome}</span>
                            <span class="nome-cientifico">(${animal.nomeCientifico})</span>
                        </div>
                    </div>
                    <div class="result-category">${animal.categoria}</div>
                `;
                searchResultsContainer.appendChild(resultElement);
            });
            searchResultsContainer.style.display = 'block';
            if (mainLayout) mainLayout.classList.add('has-results');
        }

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase().trim();
            if (searchTerm.length === 0) {
                searchResultsContainer.style.display = 'none';
                if (mainLayout) mainLayout.classList.remove('has-results');
                return;
            }
            const filteredAnimals = allAnimals.filter(animal => 
                animal.nome.toLowerCase().includes(searchTerm) || 
                animal.nomeCientifico.toLowerCase().includes(searchTerm)
            );
            displayResults(filteredAnimals);
            if (window.innerWidth > 992 && filteredAnimals.length > 0) {
                mainLayout.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
        
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.search-container') && !event.target.closest('#searchResults')) {
                searchResultsContainer.style.display = 'none';
                if (mainLayout) mainLayout.classList.remove('has-results');
            }
        });
        
        fetchAllAnimals();
    </script>
    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
