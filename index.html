<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="js/cache-reset.js?v=20260711-cache-reset-1"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandes Projetos - Pesquisa de Animais</title>
    <!-- PWA Config -->
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/logos/favicon.ico">
    <link rel="apple-touch-icon" href="assets/logos/apple-touch-icon.png">
    <meta name="theme-color" content="#0b3022">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Animais">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Global -->
    <link rel="stylesheet" href="css/style.css?v=1.0.9">
    <link rel="stylesheet" href="index/globe-search.css?v=1.0.7">
    <link rel="stylesheet" href="index/bioma-explorer.css?v=1.0.28">
    <script src="js/runtime-guard.js"></script>
    <script>
        // Forçar limpeza de cache e service workers se houver atualização
        (async function() {
            const VERSION = 'v1.0.72';
            if (localStorage.getItem('app_cache_version') !== VERSION) {
                try {
                    if ('serviceWorker' in navigator) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (let reg of regs) {
                            await reg.unregister();
                        }
                    }
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        for (let key of keys) {
                            await caches.delete(key);
                        }
                    }
                    localStorage.setItem('app_cache_version', VERSION);
                    window.location.reload();
                } catch (e) {
                    console.error("Erro ao limpar cache:", e);
                }
            }
        })();
    </script>
    <script>
        window.addEventListener('error', function(e) {
            const loadMsg = document.getElementById('loading-message');
            if (loadMsg) {
                loadMsg.innerHTML = "Erro no Script: " + e.message + "<br><small>" + e.filename + ":" + e.lineno + "</small>";
                loadMsg.style.color = "#f87171";
            }
        });
        window.addEventListener('unhandledrejection', function(e) {
            const loadMsg = document.getElementById('loading-message');
            if (loadMsg) {
                loadMsg.innerHTML = "Erro de Promessa: " + e.reason + "<br><small>" + (e.reason && e.reason.stack ? e.reason.stack : '') + "</small>";
                loadMsg.style.color = "#f87171";
            }
        });
    </script>
</head>
<body>
    <!-- SVG Gradient para ícones do Lucide -->
    <svg style="width:0; height:0; position:absolute;" aria-hidden="true">
        <defs>
            <linearGradient id="aurora-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#818cf8" />
                <stop offset="50%" stop-color="#c084fc" />
                <stop offset="100%" stop-color="#f472b6" />
            </linearGradient>
        </defs>
    </svg>

    <main>
        <div class="hero-wrapper-section">
            <section class="hero-section">
                <h1>GRANDES PROJETOS</h1>
            </section>

            <div class="hero-content-grid">
                <div class="hero-left-column">
                    <div class="index-search-area" id="indexSearchArea">
                        <div class="search-container">
                            <input type="text" id="searchInput" placeholder="Pesquise por nome comum ou científico...">
                        </div>
                    </div>

                    <p id="loading-message">A carregar animais...</p>
                    <div class="categories-container" id="categories-list" style="display: none;"></div>
                </div>

                <div id="searchResults" class="index-search-results" data-search-results-anchor="hero"></div>
            </div>
        </div>

        <!-- Globe Country Search Card -->
        <div class="globe-search-card" id="globeSearchCard" style="display: none; background-image: url('assets/capas/paradisaea_raggiana_original.png');">
            <div class="globe-search-card-inner">
                <div class="globe-search-header">
                    <i class="fa-solid fa-magnifying-glass globe-icon"></i>
                    <h2>Pesquise pelo Globo!</h2>
                </div>
                <div class="globe-search-wrapper">
                    <div class="globe-search-input-wrap">
                        <input type="text" id="globeCountryInput" placeholder="Pesquise por um país..." autocomplete="off">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    </div>
                    <div class="globe-search-results" id="globeSearchResults"></div>
                </div>
            </div>
        </div>

        <!-- Biomas Explorer Card -->
        <div class="bioma-explorer-card" id="biomaExplorerCard" style="display: none; background-image: url('assets/capas/biomas_capas/01_floresta_tropical.png');">
            <div class="bioma-explorer-header">
                <div class="bioma-explorer-header-top">
                    <i class="fa-solid fa-tree"></i>
                    <h2>Explorar por Biomas</h2>
                </div>
                <div class="bioma-explorer-tabs">
                    <button class="bioma-tab-btn active" data-tab="terrestres">
                        <span class="tab-text-desktop">Biomas terrestres</span>
                        <span class="tab-text-mobile">Terrestres</span>
                    </button>
                    <button class="bioma-tab-btn" data-tab="aquaticos">
                        <span class="tab-text-desktop">Biomas aquáticos</span>
                        <span class="tab-text-mobile">Aquáticos</span>
                    </button>
                    <button class="bioma-tab-btn" data-tab="transicao">
                        <span class="tab-text-desktop">Biomas de transição</span>
                        <span class="tab-text-mobile">Transição</span>
                    </button>
                </div>
            </div>
            <div class="bioma-list-pane" id="biomaListPane">
                <!-- Dynamic List Items -->
            </div>
            <div class="bioma-preview-info-pane">
                <h3 id="biomaPreviewTitle">Floresta tropical</h3>
                <a href="filtros.html?tipo=bioma&valor=Floresta%20tropical" class="bioma-explore-link" id="biomaExploreLink">
                    <span>Ver Animais</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>

        <div id="dynamic-sections-container">
            <!-- All sections (full-width or internal list panels) will be rendered dynamically here in exact order -->
        </div>
    </main>

    <!-- Componentes e Lógica -->
    <script type="module" src="js/components.js?v=5"></script>
    <script type="module" src="index/main.js?v=1.0.73"></script>
    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=20260711-cache-reset-1', { updateViaCache: 'none' })
                    .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
