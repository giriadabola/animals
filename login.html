<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandes Projetos - Entrar / Registar</title>
    <!-- PWA Config -->
    <link rel="manifest" href="manifest-admin.webmanifest">
    <link rel="icon" href="assets/logos/admin/favicon.ico">
    <link rel="apple-touch-icon" href="assets/logos/admin/apple-touch-icon.png">
    <meta name="theme-color" content="#0b2f22">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Admin">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Global -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper {
            max-width: 450px;
            margin: 40px auto;
            perspective: 1000px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .login-card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 30px 80px rgba(99, 102, 241, 0.15);
        }

        .tabs-header {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            padding: 4px;
            margin-bottom: 30px;
            position: relative;
        }

        .tab-toggle {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            border-radius: calc(var(--border-radius-sm) - 2px);
            transition: var(--transition);
            z-index: 2;
        }

        .tab-toggle.active {
            color: var(--text-primary);
            background: var(--accent-gradient);
            box-shadow: 0 4px 15px rgba(129, 140, 248, 0.2);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: var(--transition);
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px 16px 14px 48px;
            border-radius: var(--border-radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .input-wrapper input:focus + i {
            color: var(--primary-color);
        }

        .action-btn {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            color: var(--text-primary);
            padding: 16px;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(129, 140, 248, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 30px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(192, 132, 252, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .status-toast {
            padding: 15px;
            border-radius: var(--border-radius-sm);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
    </style>
</head>
<body>

    <main style="padding: 20px;">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="tabs-header">
                    <button class="tab-toggle active" id="tab-login">Entrar</button>
                    <button class="tab-toggle" id="tab-register">Registar</button>
                </div>

                <!-- FORMULÁRIO DE LOGIN -->
                <div class="form-section active" id="section-login">
                    <form id="form-login-el">
                        <div class="input-group">
                            <label for="login-email">Endereço de Email</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="login-email" required placeholder="exemplo@email.com">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="login-password">Palavra-passe</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="login-password" required placeholder="••••••••">
                            </div>
                        </div>

                        <button type="submit" class="action-btn">
                            Entrar <i class="fa-solid fa-right-to-bracket"></i>
                        </button>
                    </form>
                </div>

                <!-- FORMULÁRIO DE REGISTO -->
                <div class="form-section" id="section-register">
                    <form id="form-register-el">
                        <div class="input-group">
                            <label for="register-name">Nome Completo</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="register-name" required placeholder="O seu nome">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="register-email">Endereço de Email</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="register-email" required placeholder="exemplo@email.com">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="register-password">Palavra-passe</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="register-password" required minlength="6" placeholder="Mínimo 6 caracteres">
                            </div>
                        </div>

                        <button type="submit" class="action-btn">
                            Registar <i class="fa-solid fa-user-plus"></i>
                        </button>
                    </form>
                </div>

                <div id="status-toast" class="status-toast"></div>
            </div>
        </div>
    </main>

    <!-- Componentes e Firebase Logic -->
    <script type="module" src="js/components.js?v=4"></script>
    <script type="module">
        import { auth, db } from "./js/firebase-config.js?v=2";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const sectionLogin = document.getElementById('section-login');
        const sectionRegister = document.getElementById('section-register');

        const formLogin = document.getElementById('form-login-el');
        const formRegister = document.getElementById('form-register-el');
        const toast = document.getElementById('status-toast');

        // Toggle Tabs logic
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            sectionLogin.classList.add('active');
            sectionRegister.classList.remove('active');
            hideToast();
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            sectionRegister.classList.add('active');
            sectionLogin.classList.remove('active');
            hideToast();
        });

        function showToast(msg, isSuccess) {
            toast.textContent = msg;
            toast.className = `status-toast ${isSuccess ? 'toast-success' : 'toast-error'}`;
            toast.style.display = 'block';
        }

        function hideToast() {
            toast.style.display = 'none';
        }

        // Handle Login Submission
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideToast();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Sessão iniciada com sucesso! A redirecionar...", true);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (err) {
                console.error("Erro ao iniciar sessão:", err);
                let errorMsg = "Erro ao iniciar sessão. Verifique as suas credenciais.";
                if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                    errorMsg = "Email ou palavra-passe incorretos.";
                } else if (err.code === 'auth/invalid-email') {
                    errorMsg = "Endereço de email inválido.";
                }
                showToast(errorMsg, false);
            }
        });

        // Handle Registration Submission
        formRegister.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideToast();
            const nome = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save user document in collection `users`
                await setDoc(doc(db, "users", user.uid), {
                    nome: nome,
                    email: email,
                    status: "off",
                    rule: "comum",
                    animaisCriados: [],
                    animaisEditados: []
                });

                showToast("Registo efetuado com sucesso! Por favor, aguarde que a sua conta seja aceite pelo administrador.", true);
                formRegister.reset();
                setTimeout(() => {
                    tabLogin.click();
                }, 6000);
            } catch (err) {
                console.error("Erro ao registar utilizador:", err);
                let errorMsg = "Erro ao registar utilizador. Tente novamente.";
                if (err.code === 'auth/email-already-in-use') {
                    errorMsg = "Este endereço de email já está em uso.";
                } else if (err.code === 'auth/invalid-email') {
                    errorMsg = "Endereço de email inválido.";
                } else if (err.code === 'auth/weak-password') {
                    errorMsg = "A palavra-passe é demasiado fraca (mínimo de 6 caracteres).";
                }
                showToast(errorMsg, false);
            }
        });
    </script>
    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw-admin.js')
                    .then(reg => console.log('Service Worker de Administração registrado:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker de Administração:', err));
            });
        }
    </script>
</body>
</html>
