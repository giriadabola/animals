            left: 0;
            right: 0;

    <!-- Authorization Guard Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-status" style="font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px;">A verificar autorização...</div>
    </div>
    <script type="module">
        import { auth, db } from "./js/firebase-config.js?v=5";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const overlay = document.getElementById('loading-overlay');
        const statusText = document.getElementById('loading-status');

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                statusText.textContent = "Não autenticado. A redirecionar...";
                setTimeout(() => {
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname.split('/').pop() + window.location.search);
                }, 1000);
                return;
            }

            try {
                const userDocSnap = await getDoc(doc(db, "users", user.uid));
                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    if (userData.status === 'on' && (userData.rule === 'ruler' || userData.rule === 'estafeta')) {
                        // Authorized: Fade out overlay
                        overlay.style.opacity = '0';
                        overlay.style.visibility = 'hidden';
                        setTimeout(() => {
                            overlay.remove();
                        }, 400);
                        return;
                    }
                }
                statusText.textContent = "Acesso recusado. Sem permissões de acesso.";
                setTimeout(() => {
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname.split('/').pop() + window.location.search);
                }, 1500);
            } catch (error) {
                console.error("Erro na verificação de permissões:", error);
                statusText.textContent = "Erro ao verificar permissões. Tente novamente.";
                setTimeout(() => {
                    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname.split('/').pop() + window.location.search);
                }, 1500);
            }
        });
    </script>

            "familia-sub": 12,
            "genero": 12,
            "especie": 12
        };

        let subClassificationOrder = ["reino", "filo", "subfilo", "classe", "superordem", "subordem", "ordem", "familia-sub", "genero", "especie"];
        let subStatsOrder = ["mais-velozes", "mais-vida-util", "mais-altos", "mais-pesados", "mais-largo", "mais-espesso", "maior-envergadura", "gestacao-longa", "mais-crias", "mais-longos", "forca-mordida", "maior-populacao"];

        // Render List
        function renderSettingsList() {
            settingsList.innerHTML = '';
            
            currentOrder.forEach((key, index) => {
                const info = sectionDefs[key];
                if (!info) return;

                const isActive = !!currentActive[key];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'setting-item';
                
                // If it is the "hero-title" key, it renders alignment options
                if (key === 'hero-title') {
                    const alignText = heroTitleAlign === 'left' ? 'Esquerda' : heroTitleAlign === 'right' ? 'Direita' : 'Centro';
                    itemDiv.style.flexDirection = 'column';
                    itemDiv.style.alignItems = 'stretch';
                    itemDiv.style.gap = '15px';
                    itemDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <div class="setting-info">
                                <h3>${info.title}</h3>
                                <p>${info.desc}</p>
                                <div class="limit-selector" style="margin-top: 15px; display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.015); padding: 8px 12px; border-radius: var(--border-radius-sm); border: 1px dashed rgba(255, 255, 255, 0.08); width: fit-content;">
                                    <span>Posição do Título: <strong>${alignText}</strong></span>
                                    <div style="display: flex; gap: 6px; margin-left: 10px;">
                                        <button type="button" class="arrow-btn align-left-btn" ${heroTitleAlign === 'left' ? 'disabled' : ''} title="Mover para Esquerda">
                                            <i class="fa-solid fa-chevron-left"></i>
                                        </button>
                                        <button type="button" class="arrow-btn align-right-btn" ${heroTitleAlign === 'right' ? 'disabled' : ''} title="Mover para Direita">
                                            <i class="fa-solid fa-chevron-right"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="order-actions">
                                <button type="button" class="arrow-btn up-btn" data-index="${index}" ${index === 0 ? 'disabled' : ''} title="Mover para cima">
                                    <i class="fa-solid fa-chevron-up"></i>
                                </button>
                                <button type="button" class="arrow-btn down-btn" data-index="${index}" ${index === currentOrder.length - 1 ? 'disabled' : ''} title="Mover para baixo">
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                                <label class="switch">
                                    <input type="checkbox" data-key="${key}" ${isActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="stats-subcontainer categories-subcontainer" style="display: ${isActive ? 'block' : 'none'};">
                            <h4>Ordenação e Visibilidade dos Botões de Categoria (Topo)</h4>
                            <div class="stats-sublist">
                                <!-- Categories dynamically loaded here -->
                            </div>
                        </div>
                    `;

                    // Render categories sub list
                    const categoriesSublist = itemDiv.querySelector('.stats-sublist');
                    if (categoriesSublist) {
                        categoriesOrder.forEach((catKey, catIndex) => {
                            const isCatActive = categoriesActive[catKey] !== false;
                            const iconHtml = categoryIcons[catKey] || '<i class="fa-solid fa-paw"></i>';
                            const subCard = document.createElement('div');
                            subCard.className = 'sub-stat-card';
                            subCard.innerHTML = `
                                <div class="sub-stat-header">
                                    <span class="sub-stat-title">${iconHtml} ${catKey}</span>
                                    <label class="switch" style="transform: scale(0.8);">
                                        <input type="checkbox" data-cat="${catKey}" ${isCatActive ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div class="sub-stat-footer">
                                    <span style="font-size: 0.75rem; color: var(--text-muted);">Mover Horizontal</span>
                                    <div style="display: flex; gap: 4px;">
                                        <button type="button" class="arrow-btn sub-left" ${catIndex === 0 ? 'disabled' : ''} title="Mover para Esquerda">
                                            <i class="fa-solid fa-chevron-left"></i>
                                        </button>
                                        <button type="button" class="arrow-btn sub-right" ${catIndex === categoriesOrder.length - 1 ? 'disabled' : ''} title="Mover para Direita">
                                            <i class="fa-solid fa-chevron-right"></i>
                                        </button>
                                    </div>
                                </div>
                            `;

                            // Sub toggle listener
                            subCard.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
                                categoriesActive[catKey] = e.target.checked;
                                saveSettingsToFirestore();
                            });
                            
                            // Sub shift order listeners
                            subCard.querySelector('.sub-left').addEventListener('click', () => {
                                if (catIndex > 0) {
                                    const temp = categoriesOrder[catIndex];
                                    categoriesOrder[catIndex] = categoriesOrder[catIndex - 1];
                                    categoriesOrder[catIndex - 1] = temp;
                                    renderSettingsList();
                                    saveSettingsToFirestore();
                                }
                            });
                            subCard.querySelector('.sub-right').addEventListener('click', () => {
                                if (catIndex < categoriesOrder.length - 1) {
                                    const temp = categoriesOrder[catIndex];
                                    categoriesOrder[catIndex] = categoriesOrder[catIndex + 1];
                                    categoriesOrder[catIndex + 1] = temp;
                                    renderSettingsList();
                                    saveSettingsToFirestore();
                                }
                            });

                            categoriesSublist.appendChild(subCard);
                        });
                    }

                    // Event listeners for align-left-btn / align-right-btn
                    itemDiv.querySelector('.align-left-btn').addEventListener('click', () => {
                        if (heroTitleAlign === 'center') heroTitleAlign = 'left';
                        else if (heroTitleAlign === 'right') heroTitleAlign = 'center';
                        renderSettingsList();
                        saveSettingsToFirestore();
                    });

                    itemDiv.querySelector('.align-right-btn').addEventListener('click', () => {
                        if (heroTitleAlign === 'left') heroTitleAlign = 'center';
                        else if (heroTitleAlign === 'center') heroTitleAlign = 'right';
                        renderSettingsList();
                        saveSettingsToFirestore();
                    });

                } else if (key === 'classificacao-cientifica-niveis') {
                    itemDiv.style.flexDirection = 'column';
                    itemDiv.style.alignItems = 'stretch';
                    itemDiv.style.gap = '15px';
                    
                    itemDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <div class="setting-info">
                                <h3>${info.title}</h3>
                                <p>${info.desc}</p>
                            </div>
                            <div class="order-actions">
                                <button type="button" class="arrow-btn up-btn" data-index="${index}" ${index === 0 ? 'disabled' : ''} title="Mover para cima">
                                    <i class="fa-solid fa-chevron-up"></i>
                                </button>
                                <button type="button" class="arrow-btn down-btn" data-index="${index}" ${index === currentOrder.length - 1 ? 'disabled' : ''} title="Mover para baixo">
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                                <label class="switch">
                                    <input type="checkbox" data-key="${key}" ${isActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="stats-subcontainer class-subcontainer" style="display: ${isActive ? 'block' : 'none'};">
                            <h4>Ordenação dos Níveis Taxonómicos Individuais</h4>
                            <div class="stats-sublist">
                                <!-- Rendered below dynamically -->
                            </div>
                        </div>
                    `;

                    // Render Sub classification list
                    const classSublist = itemDiv.querySelector('.stats-sublist');
                    subClassificationOrder.forEach((subKey, subIndex) => {
                        const subInfo = subClassificationDefs[subKey];
                        if (!subInfo) return;

                        const isSubActive = !!currentActive[subKey];
                        const currentLimit = currentLimits[subKey] !== undefined ? currentLimits[subKey] : 12;
                        const subCard = document.createElement('div');
                        subCard.className = 'sub-stat-card';
                        subCard.innerHTML = `
                            <div class="sub-stat-header">
                                <span class="sub-stat-title"><i class="fa-solid ${subInfo.icon}" style="margin-right: 6px;"></i> ${subInfo.title}</span>
                                <label class="switch" style="transform: scale(0.8);">
                                    <input type="checkbox" data-key="${subKey}" ${isSubActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="limit-selector" style="margin-top: 5px; margin-bottom: 5px;">
                                <span style="font-size: 0.75rem;">Número de cards:</span>
                                <select class="limit-select" data-key="${subKey}" style="padding: 4px 22px 4px 8px; font-size: 0.75rem;">
                                    ${Array.from({length: 31}, (_, i) => `<option value="${i}" ${currentLimit === i ? 'selected' : ''}>${i}</option>`).join('')}
                                </select>
                            </div>
                            <div class="sub-stat-footer">
                                <span style="font-size: 0.75rem; color: var(--text-muted);">Mover Horizontal</span>
                                <div style="display: flex; gap: 4px;">
                                    <button type="button" class="arrow-btn sub-left" ${subIndex === 0 ? 'disabled' : ''} title="Mover para Esquerda">
                                        <i class="fa-solid fa-chevron-left"></i>
                                    </button>
                                    <button type="button" class="arrow-btn sub-right" ${subIndex === subClassificationOrder.length - 1 ? 'disabled' : ''} title="Mover para Direita">
                                        <i class="fa-solid fa-chevron-right"></i>
                                    </button>
                                </div>
                            </div>
                        `;

                        // Sub toggle listener
                        subCard.querySelector('input[type="checkbox"]').addEventListener('change', handleToggle);
                        
                        // Limit selector change listener
                        subCard.querySelector('.limit-select').addEventListener('change', (event) => {
                            const k = event.target.dataset.key;
                            currentLimits[k] = parseInt(event.target.value);
                            saveSettingsToFirestore();
                        });

                        // Sub shift order listeners
                        subCard.querySelector('.sub-left').addEventListener('click', () => {
                            const newIndex = subIndex - 1;
                            if (newIndex >= 0) {
                                const temp = subClassificationOrder[subIndex];
                                subClassificationOrder[subIndex] = subClassificationOrder[newIndex];
                                subClassificationOrder[newIndex] = temp;
                                renderSettingsList();
                                saveSettingsToFirestore();
                            }
                        });
                        subCard.querySelector('.sub-right').addEventListener('click', () => {
                            const newIndex = subIndex + 1;
                            if (newIndex < subClassificationOrder.length) {
                                const temp = subClassificationOrder[subIndex];
                                subClassificationOrder[subIndex] = subClassificationOrder[newIndex];
                                subClassificationOrder[newIndex] = temp;
                                renderSettingsList();
                                saveSettingsToFirestore();
                            }
                        });

                        classSublist.appendChild(subCard);
                    });

                } else if (key === 'estatisticas') {
                    itemDiv.style.flexDirection = 'column';
                    itemDiv.style.alignItems = 'stretch';
                    itemDiv.style.gap = '15px';
                    
                    itemDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <div class="setting-info">
                                <h3>${info.title}</h3>
                                <p>${info.desc}</p>
                            </div>
                            <div class="order-actions">
                                <button type="button" class="arrow-btn up-btn" data-index="${index}" ${index === 0 ? 'disabled' : ''} title="Mover para cima">
                                    <i class="fa-solid fa-chevron-up"></i>
                                </button>
                                <button type="button" class="arrow-btn down-btn" data-index="${index}" ${index === currentOrder.length - 1 ? 'disabled' : ''} title="Mover para baixo">
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                                <label class="switch">
                                    <input type="checkbox" data-key="${key}" ${isActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="stats-subcontainer" style="display: ${isActive ? 'block' : 'none'};">
                            <h4>Ordenação dos Cards Individuais de Estatística</h4>
                            <div class="stats-sublist">
                                <!-- Rendered below dynamically -->
                            </div>
                        </div>
                    `;

                    // Render Sub stats list
                    const statsSublist = itemDiv.querySelector('.stats-sublist');
                    subStatsOrder.forEach((subKey, subIndex) => {
                        const subInfo = subStatsDefs[subKey];
                        if (!subInfo) return;

                        const isSubActive = !!currentActive[subKey];
                        const subCard = document.createElement('div');
                        subCard.className = 'sub-stat-card';
                        subCard.innerHTML = `
                            <div class="sub-stat-header">
                                <span class="sub-stat-title"><i class="fa-solid ${subInfo.icon}" style="margin-right: 6px;"></i> ${subInfo.title}</span>
                                <label class="switch" style="transform: scale(0.8);">
                                    <input type="checkbox" data-key="${subKey}" ${isSubActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="sub-stat-footer">
                                <span style="font-size: 0.75rem; color: var(--text-muted);">Mover Horizontal</span>
                                <div style="display: flex; gap: 4px;">
                                    <button type="button" class="arrow-btn sub-left" ${subIndex === 0 ? 'disabled' : ''} title="Mover para Esquerda">
                                        <i class="fa-solid fa-chevron-left"></i>
                                    </button>
                                    <button type="button" class="arrow-btn sub-right" ${subIndex === subStatsOrder.length - 1 ? 'disabled' : ''} title="Mover para Direita">
                                        <i class="fa-solid fa-chevron-right"></i>
                                    </button>
                                </div>
                            </div>
                        `;

                        // Sub toggle listener
                        subCard.querySelector('input[type="checkbox"]').addEventListener('change', handleToggle);
                        
                        // Sub shift order listeners
                        subCard.querySelector('.sub-left').addEventListener('click', () => moveSubItem(subIndex, -1));
                        subCard.querySelector('.sub-right').addEventListener('click', () => moveSubItem(subIndex, 1));

                        statsSublist.appendChild(subCard);
                    });

                } else {
                    const hasLimit = ['acasalamento', 'categoria', 'familia', 'reino', 'filo', 'subfilo', 'classe', 'superordem', 'subordem', 'ordem', 'genero', 'especie'].includes(key);
                    const currentLimit = currentLimits[key] !== undefined ? currentLimits[key] : 12;
                    let limitSelectorHtml = '';
                    if (hasLimit) {
                        limitSelectorHtml = `
                            <div class="limit-selector">
                                <span>Número de cards no Index:</span>
                                <select class="limit-select" data-key="${key}">
                                    ${Array.from({length: 31}, (_, i) => `<option value="${i}" ${currentLimit === i ? 'selected' : ''}>${i}</option>`).join('')}
                                </select>
                            </div>
                        `;
                    }

                    itemDiv.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <div class="setting-info">
                                <h3>${info.title}</h3>
                                <p>${info.desc}</p>
                                ${limitSelectorHtml}
                            </div>
                            <div class="order-actions">
                                <button type="button" class="arrow-btn up-btn" data-index="${index}" ${index === 0 ? 'disabled' : ''} title="Mover para cima">
                                    <i class="fa-solid fa-chevron-up"></i>
                                </button>
                                <button type="button" class="arrow-btn down-btn" data-index="${index}" ${index === currentOrder.length - 1 ? 'disabled' : ''} title="Mover para baixo">
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                                <label class="switch">
                                    <input type="checkbox" data-key="${key}" ${isActive ? 'checked' : ''}>
                                        <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    `;
                }

                // Add main Toggle listener
                itemDiv.querySelector('input[data-key="' + key + '"]').addEventListener('change', handleToggle);
                
                // Add Limit selector change listener
                const limitSelect = itemDiv.querySelector('.limit-select');
                if (limitSelect) {
                    limitSelect.addEventListener('change', (event) => {
                        const k = event.target.dataset.key;
                        currentLimits[k] = parseInt(event.target.value);
                        saveSettingsToFirestore();
                    });
                }
                
                // Add Reorder listeners
                itemDiv.querySelector('.up-btn').addEventListener('click', () => moveItem(index, -1));
                itemDiv.querySelector('.down-btn').addEventListener('click', () => moveItem(index, 1));

                settingsList.appendChild(itemDiv);
            });
        }

        // Load initial settings
        async function loadSettings() {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    if (data.order && Array.isArray(data.order)) {
                        const validKeys = Object.keys(sectionDefs);
                        let loadedOrder = data.order.filter(k => validKeys.includes(k));
                        
                        validKeys.forEach(k => {
                            if (!loadedOrder.includes(k)) {
                                loadedOrder.push(k);
                            }
                        });
                        currentOrder = loadedOrder;
                    }
                    if (data.subClassificationOrder && Array.isArray(data.subClassificationOrder)) {
                        const validSubKeys = Object.keys(subClassificationDefs);
                        let loadedSubOrder = data.subClassificationOrder.filter(k => validSubKeys.includes(k));
                        
                        validSubKeys.forEach(k => {
                            if (!loadedSubOrder.includes(k)) {
                                loadedSubOrder.push(k);
                            }
                        });
                        subClassificationOrder = loadedSubOrder;
                    }
                    if (data.subStatsOrder && Array.isArray(data.subStatsOrder)) {
                        const validSubKeys = Object.keys(subStatsDefs);
                        let loadedSubOrder = data.subStatsOrder.filter(k => validSubKeys.includes(k));
                        
                        validSubKeys.forEach(k => {
                            if (!loadedSubOrder.includes(k)) {
                                loadedSubOrder.push(k);
                            }
                        });
                        subStatsOrder = loadedSubOrder;
                    }
                    if (data.active) {
                        Object.keys(currentActive).forEach(key => {
                            if (key in data.active) {
                                currentActive[key] = !!data.active[key];
                            }
                        });
                    } else {
                        // Migration support from old schema
                        Object.keys(currentActive).forEach(key => {
                            if (key in data) {
                                currentActive[key] = !!data[key];
                            }
                        });
                    }
                    if (data.animalShowcase) animalShowcase = { ...animalShowcase, ...data.animalShowcase };
                    if (data.heroTitleAlign) heroTitleAlign = data.heroTitleAlign;
                    if (data.categoriesOrder && Array.isArray(data.categoriesOrder)) {
                        categoriesOrder = data.categoriesOrder;
                    }
                    if (data.categoriesActive) {
                        categoriesActive = data.categoriesActive;
                    }
                    if (data.cardLimits) {
                        Object.keys(currentLimits).forEach(key => {
                            if (key in data.cardLimits) {
                                currentLimits[key] = parseInt(data.cardLimits[key]);
                            }
                        });
                    }
                    
                    // Save the merged data back to ensure DB is clean and updated
                    await setDoc(docRef, {
                        order: currentOrder,
                        subClassificationOrder: subClassificationOrder,
                        subStatsOrder: subStatsOrder,
                        active: currentActive,
                        cardLimits: currentLimits,
                        animalShowcase: animalShowcase,
                        heroTitleAlign: heroTitleAlign,
                        categoriesOrder: categoriesOrder,
                        categoriesActive: categoriesActive
                    });
                } else {
                    await setDoc(docRef, {
                        order: currentOrder,
                        subClassificationOrder: subClassificationOrder,
                        subStatsOrder: subStatsOrder,
                        active: currentActive,
                        cardLimits: currentLimits,
                        animalShowcase: animalShowcase,
                        heroTitleAlign: heroTitleAlign,
                        categoriesOrder: categoriesOrder,
                        categoriesActive: categoriesActive
                    });
                }
                renderSettingsList();
            } catch (error) {
                console.error("Erro ao carregar definições", error);
                showStatus("Erro ao carregar as definições do servidor.", "error");
            }
        }

        // Save layout/settings to Firestore
        async function saveSettingsToFirestore() {
            try {
                await setDoc(docRef, {
                    order: currentOrder,
                    subClassificationOrder: subClassificationOrder,
                    subStatsOrder: subStatsOrder,
                    active: currentActive,
                    cardLimits: currentLimits,
                    animalShowcase: animalShowcase,
                    heroTitleAlign: heroTitleAlign,
                    categoriesOrder: categoriesOrder,
                    categoriesActive: categoriesActive
                });
                showStatus("Definições guardadas com sucesso!", "success");
            } catch (error) {
                console.error("Erro ao guardar definições:", error);
                showStatus("Erro ao guardar definições no servidor.", "error");
            }
        }

        // Move high level item in list
        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= currentOrder.length) return;

            const temp = currentOrder[index];
            currentOrder[index] = currentOrder[newIndex];
            currentOrder[newIndex] = temp;

            renderSettingsList();
            saveSettingsToFirestore();
        }

        // Move sub-stat item horizontally
        function moveSubItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= subStatsOrder.length) return;

            const temp = subStatsOrder[index];
            subStatsOrder[index] = subStatsOrder[newIndex];
            subStatsOrder[newIndex] = temp;

            renderSettingsList();
            saveSettingsToFirestore();
        }

        // Toggle Active Change
        function handleToggle(event) {
            const cb = event.target;
            const key = cb.dataset.key;
            currentActive[key] = cb.checked;
            
            // If main "estatisticas" or "classificacao-cientifica-niveis" is toggled, hide/show the subcontainer
            if (key === 'estatisticas' || key === 'classificacao-cientifica-niveis') {
                const subContainer = cb.closest('.setting-item').querySelector('.stats-subcontainer');
                if (subContainer) {
                    subContainer.style.display = cb.checked ? 'block' : 'none';
                }
            }
            
            saveSettingsToFirestore();
        }

        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type === "success" ? "status-success" : "status-error";
            setTimeout(() => {
                if (statusDiv.textContent === msg) {
                    statusDiv.textContent = "";
                }
            }, 3000);
        }

        loadSettings();
    </script>

                    .then(reg => console.log('Service Worker de Administração registrado:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker de Administração:', err));
            });

    </script>
