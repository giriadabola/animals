<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loader - Polvo a teclar</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f7fafc 0%, #eef4f8 100%);
      font-family: Arial, sans-serif;
    }
    .wrap {
      width: min(92vw, 760px);
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 22px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.08);
      padding: 24px 18px 18px;
    }
    .loader {
      width: min(100%, 700px);
      height: auto;
      display: block;
      margin: 0 auto;
    }
    p {
      margin: 12px 0 0;
      color: #4d5b66;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="loader" src="polvo_teclar_computador.svg" alt="Polvo a teclar no computador" />
      <p>Loader SVG + CSS com fundo transparente.</p>
    </div>
  </div>
</body>
</html>
