<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 420" width="700" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Polvo a teclar no computador</title>
  <desc id="desc">Animação 2D de um polvo a escrever num computador, em loop, com fundo transparente.</desc>
  <style>
    .line { stroke: #5c4b43; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .softline { stroke: #6f5b52; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .blink {
      transform-origin: 220px 148px;
      animation: blink 5s infinite;
    }
    .blink2 {
      transform-origin: 284px 148px;
      animation: blink 5s 0.15s infinite;
    }
    .headBob {
      transform-origin: 252px 175px;
      animation: bob 1.8s ease-in-out infinite;
    }
    .tentA { transform-origin: 205px 232px; animation: tapA 0.9s ease-in-out infinite; }
    .tentB { transform-origin: 232px 242px; animation: tapB 0.9s ease-in-out infinite; }
    .tentC { transform-origin: 272px 242px; animation: tapC 0.9s 0.12s ease-in-out infinite; }
    .tentD { transform-origin: 303px 232px; animation: tapD 0.9s 0.12s ease-in-out infinite; }
    .idle1 { transform-origin: 166px 274px; animation: sway1 2.6s ease-in-out infinite; }
    .idle2 { transform-origin: 197px 296px; animation: sway2 2.2s ease-in-out infinite; }
    .idle3 { transform-origin: 306px 296px; animation: sway2 2.5s .3s ease-in-out infinite; }
    .idle4 { transform-origin: 336px 274px; animation: sway1 2.8s .2s ease-in-out infinite; }
    .screenGlow { animation: glow 1.4s ease-in-out infinite alternate; }
    .keys { animation: keys 0.9s steps(1) infinite; }
    .motion1 { animation: fade 0.9s infinite; }
    .motion2 { animation: fade 0.9s .22s infinite; }
    .motion3 { animation: fade 0.9s .44s infinite; }

    @keyframes bob {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(5px); }
    }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      94%, 98% { transform: scaleY(0.08); }
    }
    @keyframes tapA {
      0%,100% { transform: rotate(6deg) translateY(0px); }
      50% { transform: rotate(-10deg) translateY(14px); }
    }
    @keyframes tapB {
      0%,100% { transform: rotate(3deg) translateY(0px); }
      50% { transform: rotate(12deg) translateY(12px); }
    }
    @keyframes tapC {
      0%,100% { transform: rotate(-4deg) translateY(0px); }
      50% { transform: rotate(-15deg) translateY(11px); }
    }
    @keyframes tapD {
      0%,100% { transform: rotate(-7deg) translateY(0px); }
      50% { transform: rotate(9deg) translateY(14px); }
    }
    @keyframes sway1 {
      0%,100% { transform: rotate(0deg) translateY(0px); }
      50% { transform: rotate(7deg) translateY(4px); }
    }
    @keyframes sway2 {
      0%,100% { transform: rotate(0deg) translateY(0px); }
      50% { transform: rotate(-8deg) translateY(3px); }
    }
    @keyframes glow {
      from { opacity: .82; }
      to { opacity: 1; }
    }
    @keyframes keys {
      0%,100% { opacity: 1; }
      50% { opacity: .72; }
    }
    @keyframes fade {
      0% { opacity: 0; transform: translateX(0px); }
      25% { opacity: .85; }
      100% { opacity: 0; transform: translateX(14px); }
    }
  </style>

  <!-- desk shadow -->
  <ellipse cx="350" cy="363" rx="200" ry="22" fill="#000" opacity="0.08"/>

  <!-- desk -->
  <g>
    <rect x="116" y="296" width="470" height="20" rx="10" fill="#c48a5a" class="line"/>
    <rect x="140" y="314" width="16" height="44" rx="8" fill="#a86d45" class="line"/>
    <rect x="545" y="314" width="16" height="44" rx="8" fill="#a86d45" class="line"/>
  </g>

  <!-- computer -->
  <g>
    <rect x="405" y="113" width="180" height="115" rx="16" fill="#334b63" class="line"/>
    <rect x="421" y="128" width="148" height="84" rx="10" fill="#9be9ff" class="screenGlow"/>
    <rect x="429" y="136" width="132" height="68" rx="8" fill="#7edcff" opacity="0.55"/>
    <rect x="476" y="228" width="40" height="18" rx="7" fill="#8c97a3" class="line"/>
    <rect x="451" y="244" width="90" height="10" rx="5" fill="#bcc3cc" class="line"/>

    <g transform="translate(382 254)">
      <rect x="0" y="0" width="170" height="28" rx="10" fill="#e8edf2" class="line"/>
      <g class="keys" fill="#cfd7e0">
        <rect x="12" y="8" width="16" height="6" rx="3"/>
        <rect x="33" y="8" width="16" height="6" rx="3"/>
        <rect x="54" y="8" width="16" height="6" rx="3"/>
        <rect x="75" y="8" width="16" height="6" rx="3"/>
        <rect x="96" y="8" width="16" height="6" rx="3"/>
        <rect x="117" y="8" width="16" height="6" rx="3"/>
        <rect x="138" y="8" width="16" height="6" rx="3"/>
        <rect x="20" y="17" width="34" height="5" rx="2.5"/>
        <rect x="60" y="17" width="34" height="5" rx="2.5"/>
        <rect x="100" y="17" width="34" height="5" rx="2.5"/>
      </g>
    </g>
  </g>

  <!-- motion lines by keyboard -->
  <g stroke="#7b8ea4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.75">
    <path class="motion1" d="M564 260 q10 -4 16 0"/>
    <path class="motion2" d="M570 268 q10 -4 16 0"/>
    <path class="motion3" d="M560 276 q10 -4 16 0"/>
  </g>

  <!-- octopus -->
  <g class="headBob">
    <!-- rear tentacles -->
    <path class="idle1 line" fill="#df764f" d="M193 235 C150 257, 135 286, 143 310 C151 333, 181 331, 186 305 C190 285, 172 284, 168 301 C178 288, 194 275, 207 268"/>
    <path class="idle2 line" fill="#df764f" d="M220 244 C198 274, 191 302, 204 325 C217 346, 246 340, 242 313 C238 295, 215 299, 218 315 C226 299, 236 286, 244 279"/>
    <path class="idle3 line" fill="#df764f" d="M286 244 C308 274, 315 302, 302 325 C289 346, 260 340, 264 313 C268 295, 291 299, 288 315 C280 299, 270 286, 262 279"/>
    <path class="idle4 line" fill="#df764f" d="M313 235 C356 257, 371 286, 363 310 C355 333, 325 331, 320 305 C316 285, 334 284, 338 301 C328 288, 312 275, 299 268"/>

    <!-- body -->
    <ellipse cx="252" cy="185" rx="96" ry="87" fill="#f38457" class="line"/>
    <ellipse cx="252" cy="205" rx="84" ry="58" fill="#f08e66" opacity="0.55"/>

    <!-- face -->
    <ellipse cx="220" cy="148" rx="23" ry="29" fill="#fff" class="line"/>
    <ellipse cx="284" cy="148" rx="23" ry="29" fill="#fff" class="line"/>
    <g class="blink">
      <ellipse cx="220" cy="150" rx="9" ry="14" fill="#2d2d35"/>
      <circle cx="223" cy="145" r="3" fill="#fff"/>
    </g>
    <g class="blink2">
      <ellipse cx="284" cy="150" rx="9" ry="14" fill="#2d2d35"/>
      <circle cx="287" cy="145" r="3" fill="#fff"/>
    </g>
    <circle cx="252" cy="176" r="6" fill="#92553d"/>
    <path d="M236 194 Q252 208 268 194" fill="none" class="softline"/>
    <circle cx="203" cy="179" r="5" fill="#ffb195" opacity="0.8"/>
    <circle cx="301" cy="179" r="5" fill="#ffb195" opacity="0.8"/>

    <!-- typing tentacles -->
    <path class="tentA line" fill="#f38457" d="M212 231 C218 243, 244 250, 279 257 C334 268, 398 267, 427 263 C437 262, 440 250, 434 245 C428 240, 419 242, 410 244 C371 249, 317 248, 274 238 C246 231, 226 223, 219 220 Z"/>
    <path class="tentB line" fill="#f38457" d="M231 240 C249 249, 286 257, 335 264 C385 270, 423 269, 452 266 C461 265, 465 255, 459 249 C453 243, 444 244, 435 246 C397 249, 367 249, 333 244 C287 237, 252 228, 236 223 Z"/>
    <path class="tentC line" fill="#f38457" d="M273 240 C292 248, 327 253, 371 257 C419 261, 463 260, 488 258 C498 257, 502 247, 496 242 C490 237, 481 239, 472 240 C432 242, 402 242, 368 239 C326 235, 292 228, 278 223 Z"/>
    <path class="tentD line" fill="#f38457" d="M292 231 C305 237, 344 243, 392 247 C443 251, 495 249, 528 247 C538 246, 543 236, 537 231 C531 226, 521 228, 512 229 C474 231, 439 231, 396 228 C351 224, 313 218, 299 214 Z"/>

    <!-- small suckers on active tentacles -->
    <g fill="#ffd9c7" opacity="0.88">
      <circle cx="313" cy="251" r="4"/>
      <circle cx="337" cy="254" r="4"/>
      <circle cx="361" cy="257" r="4"/>
      <circle cx="383" cy="258" r="4"/>

      <circle cx="329" cy="242" r="4"/>
      <circle cx="355" cy="247" r="4"/>
      <circle cx="380" cy="249" r="4"/>
      <circle cx="404" cy="250" r="4"/>

      <circle cx="390" cy="239" r="4"/>
      <circle cx="415" cy="241" r="4"/>
      <circle cx="440" cy="242" r="4"/>
      <circle cx="464" cy="242" r="4"/>

      <circle cx="430" cy="228" r="4"/>
      <circle cx="454" cy="229" r="4"/>
      <circle cx="479" cy="229" r="4"/>
      <circle cx="504" cy="229" r="4"/>
    </g>
  </g>
</svg>
