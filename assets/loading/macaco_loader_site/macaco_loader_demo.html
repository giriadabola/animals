<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loader — Macaco a trepar a árvore</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(47,150,90,.11), transparent 42%),
        #15191a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eef7f0;
    }

    .loader {
      width: min(92vw, 540px);
      text-align: center;
    }

    .animation {
      width: min(84vw, 470px);
      height: auto;
      display: block;
      margin-inline: auto;
      filter: drop-shadow(0 18px 25px rgba(0,0,0,.22));
    }

    .label {
      margin: -18px 0 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .84;
    }

    .track {
      position: relative;
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.11);
      box-shadow: inset 0 2px 5px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.05);
    }

    .bar {
      position: absolute;
      inset: 0;
      width: 38%;
      border-radius: inherit;
      background: linear-gradient(90deg, #1fa95c, #3bd77d);
      box-shadow: 0 0 20px rgba(59,215,125,.42);
      animation: progress 2.1s ease-in-out infinite;
    }

    @keyframes progress {
      0%   { transform: translateX(-105%); width: 28%; }
      50%  { width: 56%; }
      100% { transform: translateX(360%); width: 28%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bar { animation: none; width: 65%; }
    }
  </style>
</head>
<body>
  <main class="loader" aria-label="A carregar">
    <img class="animation" src="macaco_trepar_arvore.svg" alt="Macaco castanho a trepar uma árvore">
    <p class="label">A carregar…</p>
    <div class="track" aria-hidden="true"><div class="bar"></div></div>
  </main>
</body>
</html>
