<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loader - Coruja a escolher livro</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f5f1ea 0%, #efe6da 100%);
      font-family: Arial, sans-serif;
    }
    .wrap {
      width: min(94vw, 980px);
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 24px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.08);
      padding: 22px 18px 16px;
    }
    img {
      width: min(100%, 900px);
      height: auto;
      display: block;
      margin: 0 auto;
    }
    p {
      margin: 12px 0 0;
      color: #5d5148;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img src="coruja_escolher_livro_biblioteca.svg" alt="Coruja a escolher um livro de uma estante de biblioteca antiga" />
      <p>SVG animado em loop, ideal para site.</p>
    </div>
  </div>
</body>
</html>
