<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria - Grandes Projetos</title>
    <!-- PWA Config -->
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/logos/favicon.ico">
    <link rel="apple-touch-icon" href="assets/logos/apple-touch-icon.png">
    <meta name="theme-color" content="#0b3022">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Animais">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Global -->
    <link rel="stylesheet" href="css/style.css?v=1.0.1">
</head>
<body>

    <main>
        <div class="category-header">
            <h1 id="category-title">A carregar categoria... <span id="toggle-icon">▼</span></h1>
        </div>
        <div id="animal-list-container"></div>
        <p class="message" id="loading-message">A carregar animais...</p>
    </main>

    <!-- Componentes e Lógica -->
    <script type="module" src="js/components.js?v=2"></script>
    <script type="module">
        import { db } from "./js/firebase-config.js?v=2";
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const categoryTitle = document.getElementById('category-title');
        const listContainer = document.getElementById('animal-list-container');
        const loadingMessage = document.getElementById('loading-message');

        function createAnimalListItem(animalData, animalId) {
            const card = document.createElement('a');
            card.className = 'animal-list-item';
            card.href = `animal.html?id=${animalId}`;

            const objectPos = animalData.imagemObjectPosition || 'center center';

            card.innerHTML = `
                <img src="${animalData.imagemUrl}" alt="Imagem de ${animalData.nome}" style="object-position: ${objectPos};">
                <div class="list-item-text">
                    <div class="title">${animalData.nome}</div>
                    <div class="subtitle">(${animalData.nomeCientifico})</div>
                </div>
            `;
            return card;
        }

        const categoryIcons = {
            Mamiferos: '<i class="fa-solid fa-paw"></i>',
            Aves: '<i class="fa-solid fa-dove"></i>',
            Peixes: '<i class="fa-solid fa-fish"></i>',
            Moluscos: '<svg viewBox="0 0 24 24" fill="currentColor" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M19 15c0-1.66-1.34-3-3-3H9c-1.66 0-3-1.34-3-3s1.34-3 3-3h7c1.66 0 3-1.34 3-3s-1.34-3-3-3h-4a5 5 0 0 0-5 5v.2c-1.8.4-3 2-3 3.8 0 2.2 1.8 4 4 4h10c1.1 0 2 .9 2 2s-.9 2-2 2H4v2h12c2.8 0 5-2.2 5-5Zm-3-12a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-7 6c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1Z"/></svg>',
            Crustaceos: '<i class="fa-solid fa-shrimp"></i>',
            Aracnideos: '<i class="fa-solid fa-spider"></i>',
            Vermes: '<i class="fa-solid fa-worm"></i>',
            Repteis: '<svg viewBox="0 0 24 24" fill="currentColor" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;"><path d="M19.5 7.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5ZM21 9c0 1.93-1.57 3.5-3.5 3.5H9c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5h7.5c.83 0 1.5-.67 1.5-1.5S17.33 5 16.5 5h-10A4.5 4.5 0 0 0 2 9.5 4.5 4.5 0 0 0 6.5 14h10c2.48 0 4.5-2.02 4.5-4.5V9ZM6.5 16A6.5 6.5 0 0 1 0 9.5V11a7.5 7.5 0 0 0 7.5 7.5H19c1.93 0 3.5-1.57 3.5-3.5v-1c0 .83-.67 1.5-1.5 1.5H6.5Z"/></svg>',
            Anfibios: '<i class="fa-solid fa-frog"></i>',
            Insetos: '<i class="fa-solid fa-bug"></i>',
            Microscopicos: '<i class="fa-solid fa-microscope"></i>',
            Extintos: '<i class="fa-solid fa-bone"></i>'
        };

        async function loadCategoryPage() {
            const params = new URLSearchParams(window.location.search);
            const categoryName = params.get('category');

            if (!categoryName) {
                categoryTitle.innerHTML = `Erro <span id="toggle-icon">!</span>`;
                loadingMessage.textContent = "Nenhuma categoria foi especificada no URL.";
                return;
            }

            document.title = `${categoryName} - Grandes Projetos`;
            const iconHtml = categoryIcons[categoryName] || '<i class="fa-solid fa-paw"></i>';
            categoryTitle.innerHTML = `
                <span class="title-with-icon" style="display: flex; align-items: center; gap: 12px;">
                    ${iconHtml}${categoryName}
                </span>
                <span class="title-actions" style="display: flex; align-items: center; gap: 16px;">
                    <i class="fa-solid fa-table-cells-large" id="view-mode-toggle" style="font-size: 1.5rem; color: var(--primary-color); cursor: pointer; transition: var(--transition);" title="Mudar visualização"></i>
                    <span id="toggle-icon">▼</span>
                </span>
            `;

            // Adjust icon styles inside the header dynamically
            setTimeout(() => {
                const headerIcon = categoryTitle.querySelector('.title-with-icon i, .title-with-icon svg');
                if (headerIcon) {
                    headerIcon.style.fontSize = "2.2rem";
                    headerIcon.style.width = "40px";
                    headerIcon.style.height = "40px";
                    headerIcon.style.display = "inline-flex";
                    headerIcon.style.alignItems = "center";
                    headerIcon.style.justifyContent = "center";
                    if (headerIcon.tagName.toLowerCase() === 'svg') {
                        headerIcon.style.fill = "url(#aurora-gradient)";
                    } else {
                        headerIcon.style.background = "var(--accent-gradient)";
                        headerIcon.style.webkitBackgroundClip = "text";
                        headerIcon.style.webkitTextFillColor = "transparent";
                    }
                }

                const viewModeToggle = document.getElementById('view-mode-toggle');
                if (viewModeToggle) {
                    viewModeToggle.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isGridView = viewModeToggle.classList.contains('fa-table-cells-large');
                        if (isGridView) {
                            viewModeToggle.classList.remove('fa-table-cells-large');
                            viewModeToggle.classList.add('fa-list');
                            listContainer.classList.add('list-view');
                        } else {
                            viewModeToggle.classList.remove('fa-list');
                            viewModeToggle.classList.add('fa-table-cells-large');
                            listContainer.classList.remove('list-view');
                        }
                    });
                }
            }, 0);

            try {
                const animalsRef = collection(db, "animais");
                const q = query(animalsRef, where("categoria", "==", categoryName));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    loadingMessage.textContent = `Nenhum animal encontrado na categoria "${categoryName}".`;
                    listContainer.style.display = 'none';
                } else {
                    loadingMessage.style.display = 'none';
                    querySnapshot.forEach((doc) => {
                        const listItem = createAnimalListItem(doc.data(), doc.id);
                        listContainer.appendChild(listItem);
                    });
                }
            } catch (error) {
                console.error("Erro ao carregar animais por categoria:", error);
                loadingMessage.textContent = "Ocorreu um erro ao carregar os dados.";
            }
        }
        
        categoryTitle.addEventListener('click', () => {
            categoryTitle.classList.toggle('is-closed');
            listContainer.classList.toggle('is-hidden');
        });

        loadCategoryPage();
    </script>
    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
