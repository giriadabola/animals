    <style>
        .subfamily-filter-nav {
            display: none;
            position: relative;
            margin: 18px 0 28px;
            padding: 14px 4px 8px;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        .subfamily-filter-nav.visible { display: block; }
        .subfamily-filter-track {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            width: max-content;
            min-width: max-content;
            padding: 2px 2px 8px;
        }
        .subfamily-filter-track::before {
            content: '';
            position: absolute;
            left: 24px;
            right: 24px;
            top: 25px;
            height: 2px;
            background: linear-gradient(90deg, rgba(110,231,183,.38), rgba(125,211,252,.22), rgba(110,231,183,.38));
            border-radius: 999px;
            z-index: 0;
        }
        .subfamily-filter-btn {
            position: relative;
            z-index: 1;
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.18);
            background: rgba(18, 20, 39, .96);
            color: rgba(255,255,255,.62);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: .78rem;
            letter-spacing: .02em;
            cursor: pointer;
            box-shadow: 0 5px 16px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05);
            transition: transform .2s ease, opacity .2s ease, border-color .2s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
            opacity: .58;
        }
        .subfamily-filter-btn:hover {
            opacity: .9;
            transform: translateY(-2px);
            border-color: rgba(110,231,183,.42);
        }
        .subfamily-filter-btn.active {
            opacity: 1;
            color: #06130f;
            border-color: rgba(255,255,255,.64);
            background: linear-gradient(135deg, #f4c430, #d7a800);
            box-shadow: 0 0 0 4px rgba(244,196,48,.12), 0 8px 20px rgba(0,0,0,.28);
            transform: translateY(-2px) scale(1.04);
        }
        .subfamily-filter-btn:not(.active) { filter: saturate(.72); }
        @media (max-width: 700px) {
            .subfamily-filter-nav { margin: 12px 0 22px; }
            .subfamily-filter-track { gap: 11px; }
            .subfamily-filter-btn { width: 44px; height: 44px; min-width: 44px; font-size: .72rem; }
            .subfamily-filter-track::before { top: 23px; left: 22px; right: 22px; }
        }

        .continent-map-panel {
            display: none;
            margin: -18px 0 32px;
            padding: 22px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .continent-map-panel.is-open { display: block; }
        .continent-map-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        .continent-map-panel-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-primary);
        }
        .continent-map-panel-header p {
            margin: 5px 0 0;
            color: var(--text-secondary);
            font-size: .92rem;
        }
        .continent-map-close,
        .continent-map-clear {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 9px 12px;
            background: rgba(0,0,0,.18);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .continent-map-close:hover,
        .continent-map-clear:hover {
            color: var(--text-primary);
            border-color: var(--primary-color);
        }
        .continent-map-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(250px, .7fr);
            gap: 20px;
            align-items: stretch;
        }
        .continent-map-canvas {
            min-height: 420px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background: rgba(0,0,0,.16);
        }
        #continent-map {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
        .continent-map-countries {
            min-width: 0;
            max-height: 436px;
            overflow-y: auto;
            padding: 4px;
        }
        .continent-map-countries-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 800;
        }
        .continent-map-status {
            color: var(--text-secondary);
            font-size: .86rem;
            margin: 0 0 12px;
            line-height: 1.45;
        }
        .continent-country-list {
            display: grid;
            gap: 8px;
        }
        .continent-country-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 11px 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(0,0,0,.14);
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
        }
        .continent-country-btn span {
            color: var(--text-secondary);
            font-size: .76rem;
            font-weight: 800;
            letter-spacing: .06em;
        }
        .continent-country-btn:hover,
        .continent-country-btn.active {
            border-color: var(--primary-color);
            background: rgba(110,231,183,.12);
            transform: translateX(3px);
        }
        .continent-country-btn.active { color: var(--primary-color); }
        .continent-map-panel .jvm-container { height: 100%; min-height: 400px; }
        .continent-map-panel .jvm-zoom-btn {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }
        @media (max-width: 800px) {
            .continent-map-layout { grid-template-columns: 1fr; }
            .continent-map-canvas,
            #continent-map,
            .continent-map-panel .jvm-container { min-height: 300px; }
            .continent-map-countries { max-height: 340px; }
        }
        .visual-all-parameters { margin: 24px 0; padding: 24px; border: 1px solid rgba(110,231,183,.34); border-radius: 22px; background: linear-gradient(135deg, rgba(15,35,49,.52), rgba(17,24,39,.28)); }
        .visual-all-parameters[hidden] { display: none; }
        .visual-all-parameters-grid { display: grid; grid-template-columns: repeat(auto-fill, 62px); justify-content: center; gap: 18px 24px; }
        .visual-all-parameter { width: 62px; height: 62px; display: flex; align-items: center; justify-content: center; border-radius: 18px; color: var(--model-accent); text-decoration: none; transition: transform .2s ease, filter .2s ease, box-shadow .2s ease; }
        .visual-all-parameter:hover { transform: translateY(-3px) scale(1.06); filter: saturate(1.15); box-shadow: 0 0 0 3px var(--model-accent-soft), 0 10px 22px rgba(0,0,0,.25); }
        .visual-all-parameter .dimension-model-icon { width: 62px; height: 62px; }
        .visual-all-parameter .dimension-model-icon img { width: 48px; height: 48px; object-fit: contain; border-radius: 10px; }
        @media (max-width: 600px) { .visual-all-parameters { padding: 18px 10px; } .visual-all-parameters-grid { gap: 14px 16px; } }
    </style>
</head>
<body>

    <main>
        <div class="category-header">
            <h1 id="category-title">A carregar...</h1>
            <div id="search-bar-container" style="display: none; margin-top: 16px; position: relative;">
                <input type="text" id="search-input" placeholder="Pesquisar nesta lista..." style="width: 100%; padding: 12px 40px 12px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.25); color: var(--text-primary); font-size: 1rem; outline: none; transition: var(--transition); box-sizing: border-box;">
                <i class="fa-solid fa-xmark" id="clear-search" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; display: none;"></i>
            </div>
        </div>
        <section id="distance-filter-panel" hidden aria-label="Filtro de distância percorrida"></section>
        <section id="visual-all-parameters" class="visual-all-parameters" hidden aria-label="Todos os parâmetros visuais">
            <div id="visual-all-parameters-grid" class="visual-all-parameters-grid"></div>
        </section>
        <section id="continent-map-panel" class="continent-map-panel" aria-hidden="true">
            <div class="continent-map-panel-header">
                <div>
                    <h2 id="continent-map-title">Mapa do continente</h2>
                    <p>Clique num país no mapa ou na lista para filtrar os animais.</p>
                </div>
                <button type="button" class="continent-map-close" id="continent-map-close" aria-label="Fechar mapa">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
            </div>
            <div class="continent-map-layout">
                <div class="continent-map-canvas">
                    <div id="continent-map" aria-label="Mapa interactivo do continente"></div>
                </div>
                <div class="continent-map-countries">
                    <div class="continent-map-countries-title">
                        <span>Países</span>
                        <button type="button" class="continent-map-clear" id="continent-map-clear">Todos</button>
                    </div>
                    <p class="continent-map-status" id="continent-map-status">Seleccione um país para filtrar a lista.</p>
                    <div class="continent-country-list" id="continent-country-list"></div>
                </div>
            </div>
        </section>
        <nav id="subfamily-filter-nav" class="subfamily-filter-nav" aria-label="Filtrar por subfamília">
            <div id="subfamily-filter-track" class="subfamily-filter-track"></div>
        </nav>
        <div id="animal-list-container"></div>
        <div class="pagination-container" id="pagination-container"></div>
        <p class="message" id="loading-message">A carregar animais...</p>
    </main>

    <!-- Componentes e Lógica -->
    <script type="module" src="js/components.js?v=5"></script>
    <script type="module">
        import { db } from "./js/firebase-config.js?v=5";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { hideLoadingOverlay } from "./js/loader.js?v=2";
        import { extractPopulationMetric, isPopulationRankingFilter, POPULATION_RANKING_KEY } from "./js/ranking-metrics.js?v=1";
        import { getDistanceMetricFromAnimal, initDistanceFilterPanel } from "./js/distance-filter.js?v=20260714_distance_filter";
        import { visualFilterPool, getVisualFilterUrl, renderVisualFilterIcon } from "./js/visual-filter-catalog.js?v=20260715_visual_catalog";

        const categoryTitle = document.getElementById('category-title');
        const listContainer = document.getElementById('animal-list-container');
        const paginationContainer = document.getElementById('pagination-container');
        const loadingMessage = document.getElementById('loading-message');
        const searchBarContainer = document.getElementById('search-bar-container');
        const searchInput = document.getElementById('search-input');
        const clearSearch = document.getElementById('clear-search');
        const subfamilyFilterNav = document.getElementById('subfamily-filter-nav');
        const subfamilyFilterTrack = document.getElementById('subfamily-filter-track');
        const visualAllParameters = document.getElementById('visual-all-parameters');
        const visualAllParametersGrid = document.getElementById('visual-all-parameters-grid');

        const itemsPerPage = 50;
        let currentPage = 1;
        let matchedAnimals = [];
        let filteredAnimals = [];
        let familyAllAnimals = [];
        let activeSubfamily = 'all';
        let activeFamilyName = '';
        let activeFilterType = '';
        let activeCountryCode = '';
        let countryFilteredAnimals = [];
        let continentMapInstance = null;
        let continentMapData = {};
        const taxonomyLabels = {
            reino: 'Reino: ',
            filo: 'Filo: ',
            subfilo: 'Subfilo: ',
            classe: 'Classe: ',
            subclasse: 'Subclasse: ',
            infraclasse: 'Infraclasse: ',
            magnordem: 'Magnordem: ',
            superordem: 'Superordem: ',
            ordem: 'Ordem: ',
            subordem: 'Subordem: ',
            infraordem: 'Infraordem: ',
            parvordem: 'Parvordem: ',
            superfamilia: 'Superfamília: ',
            subfamilia: 'Subfamília: ',
            tribo: 'Tribo: ',
            subgenero: 'Subgénero: ',
            autoridadeTaxonomica: 'Autoridade taxonómica: ',
            familia: 'Fam\u00edlia: ',
            genero: 'G\u00e9nero: ',
            especie: 'EspÃ©cie: '
        };
        const taxonomyFieldMap = {
            reino: 'reino',
            filo: 'filo',
            subfilo: 'subfilo',
            classe: 'classe',
            subclasse: 'subclasse',
            infraclasse: 'infraclasse',
            magnordem: 'magnordem',
            superordem: 'superordem',
            ordem: 'ordem',
            subordem: 'subordem',
            infraordem: 'infraordem',
            parvordem: 'parvordem',
            superfamilia: 'superfamilia',
            subfamilia: 'subfamilia',
            tribo: 'tribo',
            familia: 'familia',
            genero: 'genero',
            subgenero: 'subgenero',
            especie: 'especie',
            autoridadeTaxonomica: 'autoridadeTaxonomica'
        };

        function createAnimalListItem(animalData, animalId, extraText = '') {
            const card = document.createElement('a');
            card.className = 'animal-list-item';
            card.href = `animal.html?id=${animalId}`;

            const objectPos = animalData.imagemObjectPosition || 'center center';

            card.innerHTML = `
                <img src="${animalData.imagemUrl}" alt="Imagem de ${animalData.nome}" loading="lazy" decoding="async" style="object-position: ${objectPos};">
                <div class="list-item-text">
                    <div class="title">${animalData.nome}</div>
                    ${extraText ? `<div class="metric-value">${extraText}</div>` : ''}
                    <div class="subtitle">(${animalData.nomeCientifico})</div>
                </div>
            `;
            return card;
        }

        function renderPage(page, shouldScroll = true) {
            listContainer.innerHTML = '';
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = page * itemsPerPage;
            const pageItems = filteredAnimals.slice(startIndex, endIndex);

            pageItems.forEach(item => {
                const extra = item.displayValue || '';
                const listItem = createAnimalListItem(item.data, item.id, extra);
                listContainer.appendChild(listItem);
            });

            // Evita o salto automático ao abrir a página; mantém o scroll nas ações posteriores.
            if (shouldScroll) {
                listContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderPagination() {
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(filteredAnimals.length / itemsPerPage);

            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                btn.textContent = i;
                
                btn.addEventListener('click', () => {
                    if (i === currentPage) return;
                    currentPage = i;
                    
                    // Update active button classes
                    document.querySelectorAll('.pagination-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    renderPage(currentPage);
                });

                paginationContainer.appendChild(btn);
            }
        }


        function normalizeAnimalSearchText(value = '') {
            return String(value || '').normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();
        }

        function getAlsoKnownAsNames(animal = {}) {
            const curiosidades = animal.informacao?.curiosidades || {};
            const names = [];
            if (Array.isArray(curiosidades.tambemConhecidoComo)) names.push(...curiosidades.tambemConhecidoComo);
            if (Array.isArray(curiosidades.detalhes)) {
                curiosidades.detalhes
                    .filter(item => item?.tipo === 'Também conhecido como' && item?.valor)
                    .forEach(item => names.push(...String(item.valor).split(',')));
            }
            return names.map(name => String(name).trim()).filter(Boolean);
        }

        function animalMatchesSearch(animal = {}, normalizedQuery = '') {
            if (!normalizedQuery) return true;
            const searchable = [
                animal.nome,
                animal.nomeCientifico,
                ...getAlsoKnownAsNames(animal)
            ].map(normalizeAnimalSearchText);
            return searchable.some(value => value.includes(normalizedQuery));
        }

        function getSubfamilyValue(animal = {}) {
            return String(animal.subfamilia || animal.subFamilia || '').trim();
        }

        function getSubfamilyInitials(name = '') {
            const words = String(name).trim().split(/\s+/).filter(Boolean);
            if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
            return words[0] ? words[0].slice(0, 2).toUpperCase() : '--';
        }

        function updateFamilyCategoryTitle() {
            if (!activeFamilyName) return;
            const titleText = activeSubfamily === 'all'
                ? `Família: ${activeFamilyName}`
                : `Família: ${activeFamilyName} + ${activeSubfamily}`;

            const titleSpan = categoryTitle.querySelector('.title-with-icon');
            if (titleSpan) {
                const icon = titleSpan.querySelector('i, svg');
                titleSpan.replaceChildren();
                if (icon) titleSpan.appendChild(icon);
                titleSpan.appendChild(document.createTextNode(titleText));
            } else {
                categoryTitle.textContent = titleText;
            }
            document.title = `${titleText} - Grandes Projetos`;
        }

        function applySubfamilyFilter() {
            if (activeSubfamily === 'all') {
                matchedAnimals = [...familyAllAnimals];
            } else {
                const target = normalizeFilterText(activeSubfamily);
                matchedAnimals = familyAllAnimals.filter(item =>
                    normalizeFilterText(getSubfamilyValue(item.data)) === target
                );
            }
            searchInput.value = '';
            clearSearch.style.display = 'none';
            filteredAnimals = [...matchedAnimals];
            currentPage = 1;
            renderPage(currentPage);
            renderPagination();
            updateFamilyCategoryTitle();
        }

        function renderSubfamilyFilter() {
            const subfamilies = [...new Set(
                familyAllAnimals.map(item => getSubfamilyValue(item.data)).filter(Boolean)
            )].sort((a, b) => a.localeCompare(b, 'pt-PT'));

            if (!subfamilies.length) {
                subfamilyFilterNav.classList.remove('visible');
                subfamilyFilterTrack.innerHTML = '';
                return;
            }

            const options = [{ value: 'all', label: 'All', initials: 'All' }, ...subfamilies.map(name => ({
                value: name,
                label: name,
                initials: getSubfamilyInitials(name)
            }))];

            subfamilyFilterTrack.innerHTML = options.map(option => `
                <button type="button"
                        class="subfamily-filter-btn ${activeSubfamily === option.value ? 'active' : ''}"
                        data-subfamily="${String(option.value).replace(/&/g, '&amp;').replace(/"/g, '&quot;')}"
                        title="${String(option.label).replace(/&/g, '&amp;').replace(/"/g, '&quot;')}"
                        aria-label="${option.value === 'all' ? 'Mostrar todas as subfamílias' : `Filtrar pela subfamília ${option.label}`}"
                        aria-pressed="${activeSubfamily === option.value}">${option.initials}</button>
            `).join('');

            subfamilyFilterNav.classList.add('visible');
            subfamilyFilterTrack.querySelectorAll('.subfamily-filter-btn').forEach(button => {
                button.addEventListener('click', () => {
                    activeSubfamily = button.dataset.subfamily || 'all';
                    subfamilyFilterTrack.querySelectorAll('.subfamily-filter-btn').forEach(item => {
                        const isActive = item === button;
                        item.classList.toggle('active', isActive);
                        item.setAttribute('aria-pressed', String(isActive));
                    });
                    applySubfamilyFilter();
                });
            });
        }

        function handleSearch(queryText) {
            const normalizedQuery = queryText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            const sourceAnimals = activeFilterType === 'continente' ? countryFilteredAnimals : matchedAnimals;
            if (!normalizedQuery) {
                filteredAnimals = [...sourceAnimals];
                clearSearch.style.display = 'none';
            } else {
                filteredAnimals = sourceAnimals.filter(item => animalMatchesSearch(item.data, normalizedQuery));
                clearSearch.style.display = 'block';
            }
            
            currentPage = 1;
            renderPage(currentPage);
            renderPagination();
        }

        function normalizeFilterText(value = '') {
            return String(value).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        function normalizeFilterTypeKey(value = '') {
            return normalizeFilterText(value).replace(/[^a-z0-9]+/g, '');
        }

        function canonicalFilterType(value = '') {
            const raw = String(value || '').trim();
            const key = normalizeFilterTypeKey(raw);
            const aliases = {
                estrategiaalimentar: 'estrategia-alimento',
                estrategiaparaobteralimento: 'estrategia-alimento',
                estrategiaalimento: 'estrategia-alimento',
                zonaclimatica: 'zona-climatica',
                zonaclima: 'zona-climatica',
                vidasocial: 'vida social',
                funcaoecologica: 'função ecológica',
                locomocao: 'locomoção',
                tipodealimentacao: 'tipo de alimentação',
                tipodepercecao: 'tipo de perceção'
            };
            return aliases[key] || raw;
        }

        function renderAllVisualParameters() {
            document.title = 'Todos os parâmetros visuais - Grandes Projetos';
            categoryTitle.textContent = 'Todos os parâmetros visuais';
            visualAllParameters.hidden = false;
            visualAllParametersGrid.innerHTML = visualFilterPool.map(item => `
                <a class="dimension-model-card visual-all-parameter ${item.accent}" href="${getVisualFilterUrl(item)}" title="Filtrar por ${item.name}" aria-label="Filtrar por ${item.name}">
                    <div class="dimension-model-icon" aria-hidden="true">${renderVisualFilterIcon(item)}</div>
                </a>
            `).join('');
            document.getElementById('distance-filter-panel').hidden = true;
            document.getElementById('continent-map-panel').classList.remove('is-open');
            document.getElementById('subfamily-filter-nav').classList.remove('visible');
            listContainer.style.display = 'none';
            paginationContainer.style.display = 'none';
            loadingMessage.style.display = 'none';
            hideLoadingOverlay();
        }

        function getDistributionCountryCode(country) {
            return String(typeof country === 'object'
                ? (country.codigo || country.code || country.id || '')
                : country).trim().toUpperCase();
        }

        function animalHasCountry(animal = {}, countryCode = '') {
            const countries = animal.informacao?.distribuicao?.paises || [];
            return countries.some(country => getDistributionCountryCode(country) === countryCode);
        }

        function updateCountryFilteredList(countryCode = '', countryName = '') {
            activeCountryCode = countryCode;
            countryFilteredAnimals = countryCode
                ? matchedAnimals.filter(item => animalHasCountry(item.data, countryCode))
                : [...matchedAnimals];

            searchInput.value = '';
            clearSearch.style.display = 'none';
            filteredAnimals = [...countryFilteredAnimals];
            currentPage = 1;
            renderPage(currentPage, false);
            renderPagination();

            const hasResults = filteredAnimals.length > 0;
            listContainer.style.display = hasResults ? '' : 'none';
            loadingMessage.style.display = hasResults ? 'none' : 'block';
            if (!hasResults) {
                loadingMessage.textContent = countryName
                    ? `Nenhum animal encontrado em ${countryName}.`
                    : 'Nenhum animal encontrado.';
            }

            const status = document.getElementById('continent-map-status');
            if (status) {
                status.textContent = countryCode
                    ? `${countryName}: ${countryFilteredAnimals.length} animal(is) encontrado(s).`
                    : 'Seleccione um país para filtrar a lista.';
            }

            document.querySelectorAll('.continent-country-btn').forEach(button => {
                button.classList.toggle('active', button.dataset.countryCode === countryCode);
            });
        }

        function renderContinentCountryList(countriesByCode, continentName) {
            const list = document.getElementById('continent-country-list');
            if (!list) return;
            list.innerHTML = '';

            Object.entries(countriesByCode)
                .filter(([, entry]) => normalizeFilterText(entry?.continente) === normalizeFilterText(continentName))
                .sort(([, a], [, b]) => String(a?.nome || '').localeCompare(String(b?.nome || ''), 'pt-PT'))
                .forEach(([code, entry]) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'continent-country-btn';
                    button.dataset.countryCode = code;
                    button.innerHTML = `<strong>${entry.nome}</strong><span>${code}</span>`;
                    button.addEventListener('click', () => updateCountryFilteredList(code, entry.nome));
                    list.appendChild(button);
                });
        }

        function openContinentMap(continentName) {
            const panel = document.getElementById('continent-map-panel');
            const title = document.getElementById('continent-map-title');
            const toggle = document.getElementById('continent-map-toggle');
            if (!panel || !window.jsVectorMap) return;

            const continentCodes = Object.entries(continentMapData)
                .filter(([, entry]) => normalizeFilterText(entry?.continente) === normalizeFilterText(continentName))
                .map(([code]) => code);

            panel.classList.add('is-open');
            panel.setAttribute('aria-hidden', 'false');
            if (title) title.textContent = `Mapa de ${continentName}`;
            if (toggle) {
                toggle.classList.add('active');
                toggle.setAttribute('aria-pressed', 'true');
            }
            renderContinentCountryList(continentMapData, continentName);

            if (!continentMapInstance) {
                continentMapInstance = new window.jsVectorMap({
                    selector: '#continent-map',
                    map: 'world',
                    regionsSelectable: false,
                    zoomButtons: true,
                    zoomOnScroll: false,
                    selectedRegions: continentCodes,
                    regionStyle: {
                        initial: { fill: '#27313b', fillOpacity: 1, stroke: '#53616b', strokeWidth: .55 },
                        selected: { fill: '#5ee6ae', fillOpacity: .92 },
                        hover: { fill: '#f4c430', fillOpacity: .9, cursor: 'pointer' }
                    },
                    onRegionClick: function(event, code) {
                        const normalizedCode = String(code || '').toUpperCase();
                        const entry = continentMapData[normalizedCode];
                        if (!entry || normalizeFilterText(entry.continente) !== normalizeFilterText(continentName)) return;
                        updateCountryFilteredList(normalizedCode, entry.nome);
                    }
                });
            }

            try {
                continentMapInstance.setFocus({ regions: continentCodes, animate: false });
                if (typeof continentMapInstance.setSelectedRegions === 'function') {
                    continentMapInstance.setSelectedRegions(continentCodes);
                }
            } catch (error) {
                console.warn('Não foi possível focar o mapa no continente:', error);
            }
        }

        function closeContinentMap() {
            const panel = document.getElementById('continent-map-panel');
            const toggle = document.getElementById('continent-map-toggle');
            if (!panel) return;
            panel.classList.remove('is-open');
            panel.setAttribute('aria-hidden', 'true');
            if (toggle) {
                toggle.classList.remove('active');
                toggle.setAttribute('aria-pressed', 'false');
            }
        }

        searchInput.addEventListener('input', (e) => {
            handleSearch(e.target.value);
        });

        clearSearch.addEventListener('click', () => {
            searchInput.value = '';
            handleSearch('');
            searchInput.focus();
        });

        searchInput.addEventListener('focus', () => {
            searchInput.style.borderColor = 'var(--primary-color)';
            searchInput.style.boxShadow = '0 0 10px var(--primary-glow)';
        });
        searchInput.addEventListener('blur', () => {
            searchInput.style.borderColor = 'var(--border-color)';
            searchInput.style.boxShadow = 'none';
        });

        function extractNumericMetric(details, searchKeys, exactMatch = false) {
            const item = details.find(d => {
                if (!d.tipo) return false;
                const normalized = d.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                if (exactMatch) {
                    return searchKeys.some(key => normalized === key);
                }
                return searchKeys.every(key => normalized.includes(key));
            });
            if (!item) return null;
            const valStr = item.valor || item.valorMin || '';
            if (!valStr) return null;
            const cleanVal = valStr.replace(',', '.');
            const num = parseFloat(cleanVal.replace(/[^0-9.]/g, ''));
            if (isNaN(num)) return null;

            const unit = (item.unidade || '').toLowerCase().trim();
            let normalizedValue = num;

            // Height / Length / Width / Thickness normalization (base: cm)
            if (searchKeys.includes('altura') || searchKeys.includes('largura') || searchKeys.includes('espessura')) {
                if (unit === 'm' || unit === 'metro' || unit === 'metros') {
                    normalizedValue = num * 100;
                } else if (unit === 'mm' || unit === 'milimetro' || unit === 'milimetros') {
                    normalizedValue = num / 10;
                }
            }
            // Weight normalization (base: g)
            else if (searchKeys.includes('peso')) {
                if (unit === 'kg' || unit === 'quilo' || unit === 'quilos' || unit === 'quilograma' || unit === 'quilogramas') {
                    normalizedValue = num * 1000;
                } else if (unit === 't' || unit === 'tonelada' || unit === 'toneladas') {
                    normalizedValue = num * 1000000;
                }
            }

            return {
                numericValue: normalizedValue,
                displayValue: `${valStr} ${item.unidade || ''}`.trim()
            };
        }

        async function loadFilteredPage() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('tipo') === 'todos-parametros') {
                renderAllVisualParameters();
                return;
            }
            let filterType = canonicalFilterType(params.get('tipo') || 'estrategia-alimento');
            let filterValue = params.get('valor') || params.get('estrategia');

            if (isPopulationRankingFilter(filterType, filterValue)) {
                filterType = POPULATION_RANKING_KEY;

            activeFilterType = filterType;

            if (!filterValue && !isDistanceFilter) {
                categoryTitle.innerHTML = `Erro`;

            } else if (filterType === 'familia') {
                iconClass = 'fa-users';
                titlePrefix = 'Fam\u00edlia: ';
            } else if (taxonomyLabels[filterType]) {
                iconClass = 'fa-dna';
                titlePrefix = taxonomyLabels[filterType];
            } else if (filterType === 'mais-velozes') {
                iconClass = 'fa-bolt';
                titlePrefix = 'Ranking: ';
                filterValue = 'Os Mais Velozes';
                isRanking = true;
            } else if (filterType === 'mais-vida-util') {
                iconClass = 'fa-hourglass-half';
                titlePrefix = 'Ranking: ';
                filterValue = 'Com mais Vida Útil';
                isRanking = true;
            } else if (filterType === 'mais-altos') {
                iconClass = 'fa-arrows-up-down';
                titlePrefix = 'Ranking: ';
                filterValue = 'Os Mais Altos';
                isRanking = true;
            } else if (filterType === 'mais-pesados') {
                iconClass = 'fa-weight-hanging';
                titlePrefix = 'Ranking: ';
                filterValue = 'Os Mais Pesados';
                isRanking = true;
            } else if (filterType === 'mais-largo') {
                iconClass = 'fa-arrows-left-right';
                titlePrefix = 'Ranking: ';
                filterValue = 'Mais Largo';
                isRanking = true;
            } else if (filterType === 'mais-espesso') {
                iconClass = 'fa-ruler-combined';
                titlePrefix = 'Ranking: ';
                filterValue = 'Mais Espesso';
                isRanking = true;
            } else if (filterType === 'maior-populacao') {
                iconClass = 'fa-globe';
                titlePrefix = 'Ranking: ';
                filterValue = 'Maior População';
                isRanking = true;
            } else if (filterType === 'continente') {
                iconClass = 'fa-earth-americas';
                titlePrefix = 'Continente: ';
            } else if (filterType === 'pais') {
                iconClass = 'fa-earth-americas';
                titlePrefix = 'País: ';
                // Use the country name from URL if available
                const countryName = params.get('nome');
                if (countryName) {
                    filterValue = countryName;
                }
            } else if (isDistanceFilter) {
                iconClass = 'fa-route';
                titlePrefix = '';
            } else {
                iconClass = 'fa-tags';
                titlePrefix = `${filterType}: `;
            }

            if (filterType === 'familia') {
                activeFamilyName = filterValue;
            }

            document.title = `${filterValue} - Grandes Projetos`;
            categoryTitle.innerHTML = `
                <span class="title-with-icon" style="display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid ${iconClass}"></i> ${titlePrefix}${filterValue}
                </span>
                <span class="title-actions" style="display: flex; align-items: center; gap: 16px;">
                    <i class="fa-solid fa-magnifying-glass" id="search-toggle-btn" style="font-size: 1.5rem; color: var(--primary-color); cursor: pointer; transition: var(--transition);" title="Pesquisar"></i>
                    ${filterType === 'continente' ? '<i class="fa-solid fa-map" id="continent-map-toggle" role="button" tabindex="0" aria-label="Abrir mapa do continente" aria-pressed="false" style="font-size: 1.5rem; color: var(--primary-color); cursor: pointer; transition: var(--transition);" title="Abrir mapa do continente"></i>' : ''}
                    <i class="fa-solid fa-table-cells-large" id="view-mode-toggle" style="font-size: 1.5rem; color: var(--primary-color); cursor: pointer; transition: var(--transition);" title="Mudar visualização"></i>
                </span>
            `;

            // Adjust icon styles inside the header dynamically
            setTimeout(() => {
                const headerIcon = categoryTitle.querySelector('.title-with-icon i, .title-with-icon svg');
                if (headerIcon) {
                    headerIcon.style.fontSize = "2.2rem";
                    headerIcon.style.width = "40px";
                    headerIcon.style.height = "40px";
                    headerIcon.style.display = "inline-flex";
                    headerIcon.style.alignItems = "center";
                    headerIcon.style.justifyContent = "center";
                    headerIcon.style.background = "var(--accent-gradient)";
                    headerIcon.style.webkitBackgroundClip = "text";
                    headerIcon.style.webkitTextFillColor = "transparent";
                }

                const searchToggleBtn = document.getElementById('search-toggle-btn');
                if (searchToggleBtn) {
                    searchToggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isSearchVisible = searchBarContainer.style.display !== 'none';
                        if (isSearchVisible) {
                            searchBarContainer.style.display = 'none';
                            searchInput.value = '';
                            handleSearch('');
                        } else {
                            searchBarContainer.style.display = 'block';
                            searchInput.focus();
                        }
                    });
                }

                const viewModeToggle = document.getElementById('view-mode-toggle');
                if (viewModeToggle) {
                    viewModeToggle.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isGridView = viewModeToggle.classList.contains('fa-table-cells-large');
                        if (isGridView) {
                            viewModeToggle.classList.remove('fa-table-cells-large');
                            viewModeToggle.classList.add('fa-list');
                            listContainer.classList.add('list-view');
                        } else {
                            viewModeToggle.classList.remove('fa-list');
                            viewModeToggle.classList.add('fa-table-cells-large');
                            listContainer.classList.remove('list-view');
                        }
                    });
                }
            }, 0);

            let countriesByCode = {};
            if (filterType === 'continente') {
                try {
                    const response = await fetch('./js/countries.json');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    countriesByCode = await response.json();
                    continentMapData = countriesByCode;
                } catch (countryError) {
                    console.error('Erro ao carregar países e continentes:', countryError);
                    loadingMessage.textContent = 'Não foi possível carregar a associação dos países aos continentes.';
                    hideLoadingOverlay();
                    return;
                }
            }

            if (filterType === 'continente') {
                const mapToggle = document.getElementById('continent-map-toggle');
                const mapClose = document.getElementById('continent-map-close');
                const mapClear = document.getElementById('continent-map-clear');
                if (mapToggle) {
                    const toggleMap = () => {
                        const panel = document.getElementById('continent-map-panel');
                        if (panel?.classList.contains('is-open')) closeContinentMap();
                        else openContinentMap(filterValue);
                    };
                    mapToggle.addEventListener('click', toggleMap);
                    mapToggle.addEventListener('keydown', event => {
                        if (event.key === 'Enter' || event.key === ' ') {
                            event.preventDefault();
                            toggleMap();
                        }
                    });
                }
                mapClose?.addEventListener('click', closeContinentMap);
                mapClear?.addEventListener('click', () => updateCountryFilteredList());
            }

            try {
                const querySnapshot = await getDocs(collection(db, "animais"));
                matchedAnimals = [];

                querySnapshot.forEach((doc) => {
                    const animalData = doc.data();
                    
                    if (isDistanceFilter) {
                        const distanceMetric = getDistanceMetricFromAnimal(animalData);
                        if (distanceMetric) {
                            matchedAnimals.push({
                                data: animalData,
                                id: doc.id,
                                distanceMetric,
                                displayValue: distanceMetric.displayValue
                            });
                        }
                    } else if (isRanking) {
                        let res = null;
                        if (filterType === 'mais-velozes') {
                            res = extractNumericMetric(animalData.informacao?.geralDetalhada || [], ['velocidade']);
                        } else if (filterType === 'mais-vida-util') {
                            res = extractNumericMetric(animalData.informacao?.geralDetalhada || [], ['vida', 'util']);
                        } else if (filterType === 'mais-altos') {
                            res = extractNumericMetric(animalData.informacao?.dimensoesDetalhadas || [], ['altura']);
                        } else if (filterType === 'mais-pesados') {
                            res = extractNumericMetric(animalData.informacao?.dimensoesDetalhadas || [], ['peso'], true);
                        } else if (filterType === 'mais-largo') {
                            res = extractNumericMetric(animalData.informacao?.dimensoesDetalhadas || [], ['largura']);
                        } else if (filterType === 'mais-espesso') {
                            res = extractNumericMetric(animalData.informacao?.dimensoesDetalhadas || [], ['espessura']);
                        } else if (filterType === 'maior-populacao') {
                            res = extractPopulationMetric(animalData.informacao?.geralDetalhada || []);
                        }

                        if (res) {
                            matchedAnimals.push({
                                data: animalData,
                                id: doc.id,
                                numericValue: res.numericValue,
                                displayValue: res.displayValue
                            });
                        }
                    } else {
                        let match = false;
                        if (filterType === 'categoria') {
                            const cat = animalData.categoria;
                            const target = filterValue.trim().toLowerCase();
                            const targetClean = target.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                            if (typeof cat === 'string') {
                                const catClean = cat.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                                match = catClean === targetClean;
                            } else if (cat && typeof cat === 'object') {
                                match = Object.keys(cat).some(k => {
                                    const keyClean = k.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                                    return cat[k] === true && keyClean === targetClean;
                                });
                            }
                        } else if (filterType === 'pais') {
                            const paises = animalData.informacao?.distribuicao?.paises || [];
                            const targetCode = filterValue.trim().toUpperCase();
                            // If filterValue is a country code (2 letters), match directly
                            // Otherwise try using params valor
                            const codeToMatch = params.get('valor')?.trim().toUpperCase() || targetCode;
                            match = paises.some(p => String(typeof p === 'object' ? (p.codigo || p.code || p.id || '') : p).toUpperCase() === codeToMatch);
                        } else if (filterType === 'continente') {
                            const paises = animalData.informacao?.distribuicao?.paises || [];
                            const targetContinent = normalizeFilterText(filterValue);
                            match = paises.some(country => {
                                const code = String(typeof country === 'object' ? (country.codigo || country.code || country.id || '') : country).trim().toUpperCase();
                                const continent = countriesByCode[code]?.continente || '';
                                return normalizeFilterText(continent) === targetContinent;
                            });
                        } else if (taxonomyFieldMap[filterType]) {
                            const fieldValue = animalData[taxonomyFieldMap[filterType]];
                            match = typeof fieldValue === 'string' &&
                                normalizeFilterText(fieldValue) === normalizeFilterText(filterValue);
                        } else {
                            const isStandardType = ['estrategia-alimento', 'acasalamento', 'zona-climatica', 'bioma'].includes(filterType);
                            if (isStandardType) {
                                const details = animalData.informacao?.geralDetalhada || [];
                                const isWildcard = filterValue === '*' || normalizeFilterText(filterValue) === 'todos';
                                match = details.some(item => {
                                    if (!item.tipo) return false;
                                    const normalizedType = item.tipo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                                    
                                    const isTypeMatch = 
                                        (filterType === 'estrategia-alimento' && normalizedType.includes('estrategia') && normalizedType.includes('alimento')) ||
                                        (filterType === 'acasalamento' && normalizedType.includes('acasalamento')) ||
                                        (filterType === 'zona-climatica' && (normalizedType.includes('climatica') || normalizedType.includes('clima') || normalizedType.includes('zona'))) ||
                                        (filterType === 'bioma' && normalizedType.includes('bioma'));

                                     if (filterType === 'bioma') {
                                         const valLower = item.valor ? item.valor.trim().toLowerCase() : '';
                                         const filterLower = filterValue ? filterValue.trim().toLowerCase() : '';
                                         return isTypeMatch && valLower && (isWildcard ||
                                             valLower.includes(filterLower) || 
                                             filterLower.includes(valLower) ||
                                             (valLower === 'marinho' && filterLower.includes('ocean')) ||
                                             (valLower === 'marinho (corais)' && filterLower.includes('coral'))
                                         );
                                     }

                                    return isTypeMatch && 
                                           item.valor && 
                                           (isWildcard || item.valor.trim().toLowerCase() === filterValue.trim().toLowerCase());
                                });
                            } else {
                                const allDetails = [];
                                const addSafe = (arr) => {
                                    if (Array.isArray(arr)) {
                                        allDetails.push(...arr.filter(Boolean));
                                    }
                                };

                                const collectUnknownDetails = (value, fallbackType = '') => {
                                    if (Array.isArray(value)) {
                                        value.forEach(item => collectUnknownDetails(item, fallbackType));
                                        return;
                                    }
                                    if (!value || typeof value !== 'object') {
                                        if (fallbackType && value !== '') allDetails.push({ tipo: fallbackType, valor: value });
                                        return;
                                    }

                                    const label = value.tipo || value.type || value.label || value.categoria || fallbackType;
                                    const hasValue = value.valor || value.detalhe || value.texto || value.valorMin || value.valorMax || value.opcao;
                                    if (label && hasValue) allDetails.push(value.tipo || value.type || value.label || value.categoria ? value : { tipo: label, ...value });

                                    Object.entries(value).forEach(([key, child]) => {
                                        if (!['tipo', 'type', 'label', 'categoria', 'valor', 'detalhe', 'texto', 'valorMin', 'valorMax', 'opcao', 'unidade'].includes(key)) {
                                            collectUnknownDetails(child, key);
                                        }
                                    });
                                };
                                
                                addSafe(animalData.informacao?.geralDetalhada);
                                addSafe(animalData.informacao?.dimensoesDetalhadas);
                                addSafe(animalData.informacao?.alimentacaoDetalhada);
                                addSafe(animalData.informacao?.reproducaoDetalhada);
                                addSafe(animalData.informacao?.plumagemDetalhada);
                                collectUnknownDetails(animalData.informacao);
                                
                                const cur = animalData.informacao?.curiosidades;
                                if (cur) {
                                    if (Array.isArray(cur)) {
                                        allDetails.push(...cur);
                                    } else if (Array.isArray(cur.detalhes)) {
                                        allDetails.push(...cur.detalhes);
                                    }
                                }
                                
                                const ecologyItems = animalData.informacao?.ecologia;
                                if (ecologyItems && typeof ecologyItems === 'object') {
                                    if (Array.isArray(ecologyItems)) {
                                        allDetails.push(...ecologyItems);
                                    } else {
                                        Object.keys(ecologyItems).forEach(k => {
                                            const val = ecologyItems[k];
                                            if (val && typeof val === 'object') {
                                                allDetails.push({ tipo: k, ...val });
                                            } else if (typeof val === 'string') {
                                                allDetails.push({ tipo: k, valor: val });
                                            }
                                        });
                                    }
                                }

                                const getDisplayVal = (item) => {
                                    if (!item) return '';
                                    if (item.valor) return item.valor;
                                    if (item.detalhe) return item.detalhe;
                                    if (item.texto) return item.texto;
                                    if (item.valorMin || item.valorMax) {
                                        const min = item.valorMin || '';
                                        const max = item.valorMax || '';
                                        const unit = item.unidade || '';
                                        if (min && max) return `${min}-${max} ${unit}`.trim();
                                        return `${min || max} ${unit}`.trim();
                                    }
                                    if (item.animais && item.animais.length) {
                                        return item.animais.map(a => a.nome || a.id).join(', ');
                                    }
                                    return '';
                                };

                                const targetTypeNormalized = normalizeFilterTypeKey(filterType);
                                const targetValNormalized = normalizeFilterText(filterValue);

                                match = allDetails.some(item => {
                                    if (!item) return false;
                                    const label = item.tipo || item.type || item.label || item.categoria || '';
                                    if (!label) return false;
                                    const labelNormalized = normalizeFilterTypeKey(label);
                                    
                                    if (labelNormalized === targetTypeNormalized) {
                                        const valStr = getDisplayVal(item);
                                        if (valStr) {
                                            const valNormalized = normalizeFilterText(valStr);
                                            return targetValNormalized === '*' || targetValNormalized === 'todos' || valNormalized === targetValNormalized || valNormalized.includes(targetValNormalized) || targetValNormalized.includes(valNormalized);
                                        }
                                    }
                                    return false;
                                });
                            }
                        }

                        if (match) {
                            matchedAnimals.push({ data: animalData, id: doc.id });
                        }
                    }
                });

                if (isRanking) {
                    matchedAnimals.sort((a, b) => b.numericValue - a.numericValue);
                }

                if (isDistanceFilter) {
                    const distancePanel = document.getElementById('distance-filter-panel');
                    initDistanceFilterPanel(distancePanel, matchedAnimals, minimum => {
                        filteredAnimals = minimum === null
                            ? [...matchedAnimals]
                            : matchedAnimals.filter(item => item.distanceMetric.baseMax >= minimum);
                        currentPage = 1;
                        renderPage(currentPage, false);
                        renderPagination();
                        listContainer.style.display = filteredAnimals.length ? '' : 'none';
                        loadingMessage.style.display = filteredAnimals.length ? 'none' : 'block';
                        if (!filteredAnimals.length) {
                            loadingMessage.textContent = 'Nenhum animal encontrado para este intervalo.';
                        }
                    });
                }

                if (filterType === 'familia') {
                    familyAllAnimals = [...matchedAnimals];
                    activeSubfamily = 'all';
                    renderSubfamilyFilter();
                    updateFamilyCategoryTitle();
                } else {
                    familyAllAnimals = [];
                    subfamilyFilterNav.classList.remove('visible');
                }

                if (matchedAnimals.length === 0) {
                    loadingMessage.textContent = `Nenhum animal encontrado com "${filterValue}".`;
                    listContainer.style.display = 'none';
                } else {
                    loadingMessage.style.display = 'none';
                    listContainer.style.display = '';
                    countryFilteredAnimals = [...matchedAnimals];
                    filteredAnimals = [...matchedAnimals];
                    currentPage = 1;
                    renderPage(currentPage, false);
                    renderPagination();
                }
                hideLoadingOverlay();
            } catch (error) {
                console.error("Erro ao carregar animais por filtros:", error);
                loadingMessage.textContent = "Ocorreu um erro ao carregar os dados.";
                hideLoadingOverlay();
            }
        }


        loadFilteredPage();
    </script>
    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=20260711-cache-reset-1', { updateViaCache: 'none' })
                    .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                    .catch(err => console.log('Erro ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
