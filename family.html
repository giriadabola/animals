.metric-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.metric-filter{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#dbe3ef;border-radius:999px;padding:8px 12px;font-weight:700;cursor:pointer}.metric-filter.active{background:var(--family-accent-soft);border-color:rgba(110,231,183,.36);color:#dffdf2}
.table-wrap{overflow:auto}.family-table{width:100%;border-collapse:collapse;min-width:780px}.family-table th,.family-table td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;vertical-align:middle}.family-table th{font-size:.96rem;cursor:pointer;user-select:none;color:#eef2f7;background:rgba(255,255,255,.03);position:sticky;top:0}.family-table th.sorted{color:#a7f3d0}.family-table td{color:#d7dee8}.family-table tr:hover td{background:rgba(255,255,255,.02)}.sort-icon{margin-left:4px;font-size:.82em;opacity:.9}.table-animal{display:flex;align-items:center;gap:10px;font-weight:700}.table-animal img{width:42px;height:42px;border-radius:10px;object-fit:cover;border:1px solid rgba(255,255,255,.08)}
.empty-state{text-align:center;color:#9ca3af;padding:46px 12px}
@media(max-width:700px){.table-panel-head{align-items:flex-start}.panel-action{width:40px;height:40px;flex:0 0 40px}.chart-wrap{height:360px}.family-page{width:min(100% - 20px,1320px);padding-top:16px}.family-hero{min-height:220px;border-radius:21px}.family-hero-content{padding:25px 22px}.tree-card{width:66px;height:66px;border-radius:13px}.tree-card img{border-radius:11px}.tree-level,.species-row,.subspecies-row{gap:8px}.subspecies-divider{margin:18px 0 12px;font-size:.72rem}.animal-details{padding:18px}.animal-details-head{align-items:flex-start}.animal-details-head img{width:88px;height:88px}.family-intro{text-align:left}.table-panel{padding:18px}.metric-filter{padding:7px 10px;font-size:.9rem}}

<body><main class="family-page"><a class="family-back" href="javascript:history.back()"><i class="fa-solid fa-arrow-left"></i> Voltar</a><section id="hero" class="family-hero"><div class="family-hero-content"><span class="family-kicker">Bem-vindo à subfamília</span><h1 id="familyName">A carregar...</h1></div></section><p id="familyIntro" class="family-intro"></p><section><h2 class="section-title">Árvore da subfamília</h2><div id="familyTree" class="family-tree"><div class="empty-state">A carregar animais...</div></div></section><section id="animalDetails" class="animal-details"></section><section class="table-panel"><div class="table-panel-head"><h2 class="section-title">Comparação da subfamília</h2><div class="table-panel-actions"><button id="showStatsChart" class="panel-action stats-chart-button" type="button" title="Ver gráfico de barras" aria-label="Ver gráfico de barras" hidden><i class="fa-solid fa-chart-column"></i></button><button id="exportPdf" class="panel-action pdf-export" type="button" title="Exportar tabela em PDF" aria-label="Exportar tabela em PDF"><i class="fa-solid fa-file-pdf"></i></button></div></div><div id="metricFilters" class="metric-filters"></div><div class="table-wrap"><table class="family-table"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div><section id="statsChartPanel" class="chart-panel" aria-live="polite"><div class="chart-panel-head"><h3 id="statsChartTitle">Gráfico de barras</h3><button id="closeStatsChart" class="chart-close" type="button" title="Fechar gráfico" aria-label="Fechar gráfico"><i class="fa-solid fa-xmark"></i></button></div><div id="statsChartWrap" class="chart-wrap"><canvas id="statsChart"></canvas></div><div id="statsChartEmpty" class="chart-empty" hidden>Não existem valores numéricos suficientes para criar o gráfico.</div></section></section></main>

<script type="module">
import {db} from './js/firebase-config.js?v=5';
import {hideLoadingOverlay} from './js/loader.js?v=2';
import {collection,query,where,getDocs,doc,getDoc} from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const family=new URLSearchParams(location.search).get('subfamilia')?.trim()||new URLSearchParams(location.search).get('familia')?.trim()||'';
const familyName=document.querySelector('#familyName'),intro=document.querySelector('#familyIntro'),hero=document.querySelector('#hero'),tree=document.querySelector('#familyTree'),details=document.querySelector('#animalDetails');
const metricDefs=[['Altura','Altura'],['Peso','Peso'],['Comprimento total','Comprimento Total'],['Vida útil','Vida útil'],['Velocidade máxima','Velocidade máxima'],['Atividade','Atividade'],['Vida Social','Vida Social']];let animals=[];let visibleMetrics=new Set(metricDefs.map(x=>x[0]));let sortState={key:'Animal',direction:'asc'};let statsChart=null;
function slug(v){return v.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'familia'}
function getImage(a){return a.imagemUrl||a.profileImages?.[0]?.url||''}
function getObjectPosition(a){return a.imagemObjectPosition||'center center'}
function fmtRange(min,max,unit=''){const a=String(min??'').trim(),b=String(max??'').trim(),u=String(unit??'').trim();let value='';if(a&&b)value=a===b?a:`${a}–${b}`;else value=a||b;if(!value)return '-';return `${value}${u?' '+u:''}`.trim()}
function fmtDimension(a,label){const arr=a.informacao?.dimensoesDetalhadas||[];const item=arr.find(x=>(x.tipo||'').toLowerCase()===label.toLowerCase());if(!item)return '-';return fmtRange(item.valorMin||item.valor||'',item.valorMax||'',item.unidade||'')}
function fmtGeneral(a,label){const arr=a.informacao?.geralDetalhada||[];const item=arr.find(x=>(x.tipo||'').toLowerCase()===label.toLowerCase());if(!item)return '-';return fmtRange(item.valor||item.valorMin||item.opcao||item.descricao||'',item.valorMax||'',item.unidade||'')}
function metric(a,key){if(['Altura','Peso','Comprimento total'].includes(key))return fmtDimension(a,key);return fmtGeneral(a,key)}
function card(a){const title=[a.nome||'Animal',a.nomeCientifico||''].filter(Boolean).join(' — ');return `<button class="tree-card" data-id="${esc(a.id)}" title="${esc(title)}" aria-label="${esc(title)}"><img src="${esc(getImage(a))}" alt="${esc(a.nome||'Animal')}" style="object-position:${esc(getObjectPosition(a))}"><span><strong>${esc(a.nome||'Animal')}</strong><em>${esc(a.nomeCientifico||'')}</em></span></button>`}
function renderTree(){
 const byId=new Map(animals.map(a=>[a.id,a]));
 const children=new Map();
 animals.forEach(a=>(Array.isArray(a.subespeciesDe)?a.subespeciesDe:[]).forEach(pid=>{if(byId.has(pid)){if(!children.has(pid))children.set(pid,[]);children.get(pid).push(a)}}));
 const childIds=new Set([...children.values()].flat().map(a=>a.id));
 const roots=animals.filter(a=>!childIds.has(a.id)).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt'));
 const linkedChildren=[];
 roots.forEach(root=>(children.get(root.id)||[]).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt')).forEach(k=>linkedChildren.push({animal:k,parentId:root.id})));
 const unattached=animals.filter(a=>childIds.has(a.id)&&!(Array.isArray(a.subespeciesDe)?a.subespeciesDe:[]).some(id=>byId.has(id)));
 let html='';
 if(roots.length){
   html+=`<div class="tree-level species-row">${roots.map(a=>`<div class="species-node" data-species-id="${esc(a.id)}">${card(a)}</div>`).join('')}</div>`;
 }
 if(linkedChildren.length){
   html+=`<div class="subspecies-divider"><span>Subespécies</span></div><div class="tree-level subspecies-row">${linkedChildren.map(({animal,parentId})=>`<div class="subspecies-node" data-parent-id="${esc(parentId)}">${card(animal)}</div>`).join('')}</div><svg class="family-connectors" aria-hidden="true"></svg>`;
 }
 if(unattached.length){
   html+=`<div class="tree-level tree-unattached">${unattached.map(card).join('')}</div>`;
 }
 tree.innerHTML=roots.length||unattached.length?html:'<div class="empty-state">Ainda não existem animais nesta subfamília.</div>';
 tree.querySelectorAll('.tree-card').forEach(b=>b.onclick=()=>showDetails(b.dataset.id,b));
 requestAnimationFrame(drawFamilyConnectors);
}
function drawFamilyConnectors(){
 const svg=tree.querySelector('.family-connectors');if(!svg)return;
 const box=tree.getBoundingClientRect();svg.setAttribute('viewBox',`0 0 ${box.width} ${box.height}`);svg.innerHTML='';
 const divider=tree.querySelector('.subspecies-divider');
 const dividerBox=divider?divider.getBoundingClientRect():null;
 const trunkY=dividerBox?dividerBox.top-box.top+dividerBox.height/2:null;
 tree.querySelectorAll('.subspecies-node[data-parent-id]').forEach(child=>{
  const parent=tree.querySelector(`.species-node[data-species-id="${CSS.escape(child.dataset.parentId)}"]`);if(!parent)return;
  const pr=parent.getBoundingClientRect(),cr=child.getBoundingClientRect();
  const x1=pr.left-box.left+pr.width/2,y1=pr.bottom-box.top;
  const x2=cr.left-box.left+cr.width/2,y2=cr.top-box.top;
  const jointY=trunkY!==null?trunkY:y1+(y2-y1)*.5;
  const ns='http://www.w3.org/2000/svg';
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',`M ${x1} ${y1} V ${jointY} M ${x2} ${jointY} V ${y2}`);
  svg.appendChild(path);
  const bridge=document.createElementNS(ns,'path');
  bridge.setAttribute('d',`M ${x1} ${jointY} H ${x2}`);
  svg.appendChild(bridge);
 });
}
window.addEventListener('resize',()=>requestAnimationFrame(drawFamilyConnectors));
function closeAnimalDetails(){details.classList.remove('visible');details.innerHTML='';tree.querySelectorAll('.tree-card').forEach(x=>x.classList.remove('active'))}
function showDetails(id,btn){const a=animals.find(x=>x.id===id);if(!a)return;tree.querySelectorAll('.tree-card').forEach(x=>x.classList.toggle('active',x===btn));details.innerHTML=`<button class="animal-details-close" type="button" title="Fechar cartão" aria-label="Fechar cartão"><i class="fa-solid fa-xmark"></i></button><div class="animal-details-head"><img src="${esc(getImage(a))}" alt="" style="object-position:${esc(getObjectPosition(a))}"><div><h2>${esc(a.nome||'Animal')}</h2><em>${esc(a.nomeCientifico||'')}</em><a class="detail-link" href="animal.html?id=${encodeURIComponent(a.id)}">Visitar Animal&nbsp; →</a></div></div>`;details.querySelector('.animal-details-close').onclick=closeAnimalDetails;details.classList.add('visible');details.scrollIntoView({behavior:'smooth',block:'nearest'})}
function parseSortable(value){const raw=String(value??'').trim();if(!raw||raw==='-')return {empty:true,text:'',num:null};const n=raw.replace(',','.').match(/-?\d+(?:\.\d+)?/);return {empty:false,text:raw.toLocaleLowerCase('pt'),num:n?Number(n[0]):null}}
function compareAnimals(a,b,key){const av=key==='Animal'?(a.nome||''):metric(a,key),bv=key==='Animal'?(b.nome||''):metric(b,key);const pa=parseSortable(av),pb=parseSortable(bv);if(pa.empty!==pb.empty)return pa.empty?1:-1;let result;if(pa.num!==null&&pb.num!==null)result=pa.num-pb.num;else result=pa.text.localeCompare(pb.text,'pt',{numeric:true,sensitivity:'base'});return sortState.direction==='asc'?result:-result}

function metricChartValue(value){
 const raw=String(value??'').trim();
 if(!raw||raw==='-')return null;
 const matches=[...raw.replace(/,/g,'.').matchAll(/-?\d+(?:\.\d+)?/g)].map(m=>Number(m[0])).filter(Number.isFinite);
 if(!matches.length)return null;
 if(matches.length>=2&&/[–—-]/.test(raw.replace(/^-/,'')))return (matches[0]+matches[1])/2;
 return Math.abs(matches[0]);
}
function metricUnit(value){
 const raw=String(value??'').trim();
 if(!raw||raw==='-')return '';
 return raw.replace(/-?\d+(?:[.,]\d+)?(?:\s*[–—-]\s*-?\d+(?:[.,]\d+)?)?/g,'').trim();
}
function closeStatsChart(){
 document.querySelector('#statsChartPanel').classList.remove('visible');
}
function renderStatsChart(){
 const selected=metricDefs.filter(([key])=>visibleMetrics.has(key));
 if(selected.length!==1)return;
 const [key,label]=selected[0];
 const rows=animals.map(a=>{const display=metric(a,key);return {name:a.nome||'Animal',value:metricChartValue(display),display,unit:metricUnit(display)}}).filter(row=>row.value!==null).sort((a,b)=>b.value-a.value||a.name.localeCompare(b.name,'pt',{sensitivity:'base'}));
 const panel=document.querySelector('#statsChartPanel'),wrap=document.querySelector('#statsChartWrap'),empty=document.querySelector('#statsChartEmpty');
 panel.classList.add('visible');
 document.querySelector('#statsChartTitle').textContent=`${label} por animal`;
 if(statsChart){statsChart.destroy();statsChart=null}
 if(!rows.length||!window.Chart){wrap.hidden=true;empty.hidden=false;return}
 wrap.hidden=false;empty.hidden=true;
 const commonUnit=rows.map(r=>r.unit).find(Boolean)||'';
 const valueLabelsPlugin={id:'valueLabels',afterDatasetsDraw(chart){const {ctx}=chart;ctx.save();ctx.font='700 12px sans-serif';ctx.fillStyle='#f8fafc';ctx.textAlign='center';ctx.textBaseline='bottom';chart.getDatasetMeta(0).data.forEach((bar,index)=>{const text=rows[index].display;ctx.fillText(text,bar.x,Math.max(bar.y-7,14))});ctx.restore()}};
 statsChart=new Chart(document.querySelector('#statsChart'),{type:'bar',data:{labels:rows.map(r=>r.name),datasets:[{label,data:rows.map(r=>r.value),backgroundColor:'rgba(129,140,248,.72)',borderColor:'rgba(165,180,252,.95)',borderWidth:1,borderRadius:8,maxBarThickness:74}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>rows[ctx.dataIndex].display}}},scales:{x:{title:{display:true,text:'Animal'},ticks:{color:'#cbd5e1',maxRotation:35,minRotation:0},grid:{display:false}},y:{beginAtZero:true,title:{display:true,text:commonUnit?`${label} (${commonUnit})`:label},ticks:{color:'#cbd5e1'},grid:{color:'rgba(148,163,184,.16)'}}}},plugins:[valueLabelsPlugin]});
 panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function exportTablePdf(){
 const btn=document.querySelector('#exportPdf');
 try{
  if(!window.jspdf?.jsPDF)throw new Error('Biblioteca de PDF indisponível.');
  btn.disabled=true;
  const {jsPDF}=window.jspdf;
  const defs=metricDefs.filter(([k])=>visibleMetrics.has(k));
  const columns=[['Animal','Animal'],...defs];
  const sorted=[...animals].sort((a,b)=>compareAnimals(a,b,sortState.key));
  const docPdf=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
  docPdf.setFillColor(255,255,255);docPdf.rect(0,0,docPdf.internal.pageSize.getWidth(),docPdf.internal.pageSize.getHeight(),'F');
  docPdf.setTextColor(20,24,47);docPdf.setFontSize(18);docPdf.text(`Comparação da subfamília ${family}`,40,42);
  docPdf.autoTable({
   startY:76,
   head:[columns.map(([,label])=>label)],
   body:sorted.map(a=>[a.nome||'Animal',...defs.map(([key])=>metric(a,key))]),
   theme:'grid',
   styles:{fontSize:8,cellPadding:6,textColor:[35,42,58],fillColor:[255,255,255],lineColor:[215,220,228],lineWidth:.5},
   headStyles:{fillColor:[20,24,47],textColor:[255,255,255],fontStyle:'bold'},
   alternateRowStyles:{fillColor:[246,248,251]},
   margin:{left:40,right:40}
  });
  docPdf.save(`comparacao-${slug(family)}.pdf`);
 }catch(error){console.error(error);alert('Não foi possível gerar o PDF. Tenta novamente.')}finally{btn.disabled=false}
}
function renderTable(){document.querySelector('#exportPdf').onclick=exportTablePdf;const chartBtn=document.querySelector('#showStatsChart');chartBtn.hidden=visibleMetrics.size!==1;chartBtn.onclick=renderStatsChart;document.querySelector('#closeStatsChart').onclick=closeStatsChart;if(visibleMetrics.size!==1)closeStatsChart();document.querySelector('#metricFilters').innerHTML=metricDefs.map(([k,l])=>`<button class="metric-filter ${visibleMetrics.has(k)?'active':''}" data-key="${esc(k)}">${esc(l)}</button>`).join('');document.querySelectorAll('.metric-filter').forEach(b=>b.onclick=()=>{visibleMetrics.has(b.dataset.key)?visibleMetrics.delete(b.dataset.key):visibleMetrics.add(b.dataset.key);renderTable()});const defs=metricDefs.filter(([k])=>visibleMetrics.has(k));const columns=[['Animal','Animal'],...defs];document.querySelector('#tableHead').innerHTML=`<tr>${columns.map(([k,l])=>`<th data-sort="${esc(k)}" class="${sortState.key===k?'sorted':''}" title="Ordenar por ${esc(l)}">${esc(l)}<span class="sort-icon">${sortState.key===k?(sortState.direction==='asc'?'▲':'▼'):'↕'}</span></th>`).join('')}</tr>`;document.querySelectorAll('#tableHead th[data-sort]').forEach(th=>th.onclick=()=>{const key=th.dataset.sort;if(sortState.key===key)sortState.direction=sortState.direction==='asc'?'desc':'asc';else sortState={key,direction:'asc'};renderTable()});const sorted=[...animals].sort((a,b)=>compareAnimals(a,b,sortState.key));document.querySelector('#tableBody').innerHTML=sorted.map(a=>`<tr><td><span class="table-animal"><img src="${esc(getImage(a))}" alt="" style="object-position:${esc(getObjectPosition(a))}">${esc(a.nome||'Animal')}</span></td>${defs.map(([k])=>`<td>${esc(metric(a,k))}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${columns.length}">Sem dados</td></tr>`}
async function load(){
 try{
  if(!family){
   familyName.textContent='Família não indicada';
   tree.innerHTML='<div class="empty-state">Abre esta página através de um animal.</div>';
   return;
  }
  familyName.textContent=family;document.title=`Subfamília ${family}`;
  intro.textContent='Conheça os animais que pertencem a esta subfamília e compare as suas principais características.';
  try{
    const cfg=await getDoc(doc(db,'subfamilia',slug(family)));
    if(cfg.exists()){
      const d=cfg.data();
      if(d.paragrafo)intro.textContent=d.paragrafo;
      if(d.imagemUrl)hero.style.backgroundImage=`url("${String(d.imagemUrl).replace(/"/g,'%22')}")`;
    }
  }catch(e){console.warn('Configuração pública da subfamília indisponível; a página continuará com o conteúdo padrão.',e)}
  try{
    const snap=await getDocs(query(collection(db,'animais'),where('subfamilia','==',family)));
    animals=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt'));
    renderTree();renderTable();
  }catch(e){console.error(e);tree.innerHTML='<div class="empty-state">Não foi possível carregar os animais desta subfamília.</div>';renderTable()}
 }finally{
  hideLoadingOverlay();
 }
}
load();
</script></body></html>
