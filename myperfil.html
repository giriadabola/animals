<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>O meu perfil</title>
  <link rel="icon" href="assets/logos/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.0.7">
  <style>
    :root{--profile-bg:#070914;--profile-panel:#11152a;--profile-panel2:#171b34;--profile-text:#f2f4fb;--profile-muted:#aeb7ce;--profile-line:rgba(255,255,255,.09);--profile-accent:#9b7cff;--profile-mint:#83efc1;--profile-green:#22c55e;--profile-yellow:#facc15;--profile-red:#ef4444}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 50% -10%,#1b1742 0,#090b18 35%,var(--profile-bg) 70%);color:var(--profile-text);font-family:Nunito,sans-serif;min-height:100vh}
    .page{width:min(1180px,calc(100% - 32px));margin:auto;padding:42px 0 80px}
    .identity{padding:28px;border:1px solid var(--profile-line);border-radius:25px;background:linear-gradient(135deg,rgba(155,124,255,.14),rgba(17,21,42,.94));box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .identity small{color:var(--profile-mint);font-weight:900;text-transform:uppercase;letter-spacing:.12em}.identity h1{font-size:clamp(2rem,5vw,3.8rem);margin:6px 0 0}
    .tabs{display:flex;gap:9px;margin:28px 0 18px;flex-wrap:wrap}.tab{border:1px solid var(--profile-line);background:#11152a;color:var(--profile-muted);border-radius:999px;padding:11px 20px;font-weight:900;cursor:pointer}.tab.active{background:rgba(155,124,255,.18);color:#fff;border-color:rgba(155,124,255,.55)}
    .panel{border:1px solid var(--profile-line);border-radius:25px;background:rgba(17,21,42,.88);padding:24px;min-height:260px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:16px}.animal-card{display:grid;grid-template-columns:76px 1fr;gap:14px;align-items:center;padding:14px;border-radius:18px;background:var(--profile-panel2);border:1px solid var(--profile-line);text-decoration:none;color:inherit;transition:.2s}.animal-card:hover{transform:translateY(-2px);border-color:rgba(155,124,255,.55)}.animal-card img{width:76px;height:76px;border-radius:14px;object-fit:cover}.animal-card strong{display:block;font-size:1.02rem}.animal-card em{display:block;color:var(--profile-muted);font-size:.86rem;margin-top:3px}.empty,.loading{color:var(--profile-muted);text-align:center;padding:60px 16px;font-weight:800}.lists-grid{display:grid;gap:14px}.list-card{border:1px solid var(--profile-line);border-radius:18px;background:var(--profile-panel2);overflow:hidden}.list-head{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;padding:17px 18px;border:0;background:transparent;color:inherit;text-align:left;cursor:pointer}.list-title-wrap{display:flex;align-items:center;gap:11px;min-width:0}.list-title-wrap h3{margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.list-chevron{color:var(--profile-muted);font-size:.9rem;transition:transform .2s ease}.list-card.open .list-chevron{transform:rotate(90deg)}.badge{display:inline-grid;place-items:center;min-width:32px;height:32px;background:rgba(131,239,193,.13);color:var(--profile-mint);border-radius:999px;padding:0 10px;font-weight:900}.list-body{display:none;padding:0 16px 16px}.list-card.open .list-body{display:block}.list-view-toolbar{display:flex;justify-content:flex-end;gap:8px;padding:4px 0 14px}.view-btn{display:grid;place-items:center;width:40px;height:40px;border:1px solid var(--profile-line);border-radius:12px;background:rgba(255,255,255,.045);color:var(--profile-muted);cursor:pointer;transition:.2s}.view-btn:hover{color:#fff;border-color:rgba(155,124,255,.5)}.view-btn.active{color:#fff;background:rgba(155,124,255,.2);border-color:rgba(155,124,255,.65)}.list-animals.list-view .grid{display:grid;grid-template-columns:1fr;gap:10px}.list-animals.list-view .animal-card{grid-template-columns:58px 1fr;padding:10px 12px;border-radius:14px}.list-animals.list-view .animal-card img{width:58px;height:58px;border-radius:11px}.error{color:#fda4af;text-align:center;padding:45px}
    .portfolio-toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding-bottom:18px;border-bottom:1px solid var(--profile-line);flex-wrap:wrap}.pagination{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:22px}.page-btn{min-width:40px;height:40px;border-radius:12px;border:1px solid var(--profile-line);background:rgba(255,255,255,.05);color:var(--profile-text);font-weight:900;cursor:pointer}.page-btn.active{background:rgba(155,124,255,.24);border-color:rgba(155,124,255,.7);color:#fff}.contribute-tab{color:#ffd58f!important;border-color:rgba(245,158,11,.45)!important;background:rgba(245,158,11,.1)!important}.contribute-tab.active{background:linear-gradient(135deg,rgba(245,158,11,.28),rgba(236,72,153,.18))!important;border-color:rgba(245,158,11,.75)!important}.collab-request{max-width:720px;margin:18px auto;text-align:center;padding:34px;border:1px solid var(--profile-line);border-radius:22px;background:linear-gradient(135deg,rgba(245,158,11,.09),rgba(155,124,255,.1))}.collab-request i{font-size:2.5rem;color:#f6bd60;margin-bottom:12px}.collab-request h2{margin:0 0 10px}.collab-request p{color:var(--profile-muted);line-height:1.6}.request-btn{border:0;border-radius:999px;padding:13px 22px;background:linear-gradient(135deg,#f59e0b,#ec4899);color:#fff;font-weight:900;cursor:pointer}.request-btn:disabled{opacity:.6;cursor:not-allowed}.request-status{margin-top:14px;font-weight:900;color:var(--profile-mint)}.quality-filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.filter-btn{min-width:44px;height:42px;border-radius:14px;border:1px solid var(--profile-line);background:rgba(255,255,255,.05);color:var(--profile-text);font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 12px}.filter-btn.active{outline:2px solid rgba(211,154,93,.75);background:rgba(211,154,93,.12)}.quality-forte{color:var(--profile-green)}.quality-melhorar{color:var(--profile-yellow)}.quality-basico{color:var(--profile-red)}.portfolio-count{color:var(--profile-muted);font-weight:700}.portfolio-table-wrap{width:100%;overflow-x:auto;margin-top:2px}.portfolio-table{width:100%;border-collapse:collapse;min-width:820px}.portfolio-table th,.portfolio-table td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--profile-line);vertical-align:middle}.portfolio-table th{color:var(--profile-muted);text-transform:uppercase;letter-spacing:.08em;font-size:.78rem}.portfolio-table tr:hover td{background:rgba(255,255,255,.035)}.portfolio-thumb{width:58px;height:58px;border-radius:16px;object-fit:cover;background:var(--profile-panel2);border:1px solid var(--profile-line)}.portfolio-name{font-weight:900}.portfolio-scientific{color:var(--profile-muted);font-style:italic}.quality-pill{display:inline-flex;align-items:center;gap:8px;font-weight:900}.edit-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:999px;padding:10px 15px;background:linear-gradient(135deg,#d39a5d,#e77b67);color:#fff;font-weight:900;text-decoration:none;white-space:nowrap}
    @media(max-width:720px){.page{width:min(100% - 20px,1180px);padding-top:24px}.identity,.panel{border-radius:22px}.portfolio-toolbar{align-items:stretch}.quality-filters{width:100%}.filter-btn{flex:1}.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:3px}.tab{white-space:nowrap}}
  </style>
</head>
<body>
  <main class="page">
    <section class="identity"><small>O meu perfil</small><h1 id="profile-name">A carregar…</h1></section>
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="favorites" type="button">Favoritos</button>
      <button class="tab" data-tab="lists" type="button">Lists</button>
      <button class="tab" data-tab="collaboration" type="button">Colaboração</button>
      <button class="tab contribute-tab" data-tab="contribute" type="button"><i class="fa-solid fa-handshake-angle"></i> Colaborar</button>
    </div>
    <section class="panel" id="content"><div class="loading">A carregar perfil…</div></section>
  </main>

  <script type="module" src="js/components.js?v=6"></script>
  <script type="module">
    import { auth, db } from './js/firebase-config.js?v=5';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js';
    import { doc,getDoc,setDoc,collection,getDocs,query,where,documentId,serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';

    const QUALITY_LEVELS={
      forte:{label:'Forte',icon:'fa-solid fa-shield-halved',className:'quality-forte'},
      melhorar:{label:'Melhorar',icon:'fa-solid fa-wand-magic-sparkles',className:'quality-melhorar'},
      basico:{label:'Básico',icon:'fa-solid fa-circle-exclamation',className:'quality-basico'}
    };
    const content=document.getElementById('content');
    const nameEl=document.getElementById('profile-name');
    const PAGE_SIZE=50;
    let user=null,profile=null,allMyAnimals=null,activeQuality='',portfolioPage=1;
    const esc=(v='')=>String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function cacheGet(id){try{const x=JSON.parse(localStorage.getItem('animal-summary:'+id)||'null');return x&&Date.now()-x.t<86400000?x.data:null}catch{return null}}
    function cacheSet(id,data){try{localStorage.setItem('animal-summary:'+id,JSON.stringify({t:Date.now(),data}))}catch{}}
    async function loadAnimals(ids){const unique=[...new Set((ids||[]).filter(Boolean))],found=new Map(),missing=[];unique.forEach(id=>{const c=cacheGet(id);c?found.set(id,c):missing.push(id)});for(let i=0;i<missing.length;i+=10){const part=missing.slice(i,i+10);const snap=await getDocs(query(collection(db,'animais'),where(documentId(),'in',part)));snap.forEach(d=>{const a={id:d.id,...d.data()};found.set(d.id,a);cacheSet(d.id,a)})}return unique.map(id=>found.get(id)).filter(Boolean)}
    function cards(animals){if(!animals.length)return '<div class="empty">Ainda não existem animais aqui.</div>';return `<div class="grid">${animals.map(a=>`<a class="animal-card" href="animal.html?id=${encodeURIComponent(a.id)}"><img src="${esc(a.imagemUrl||'')}" alt=""><span><strong>${esc(a.nome||'Animal')}</strong><em>${esc(a.nomeCientifico||'')}</em></span></a>`).join('')}</div>`}
    async function showFavorites(){content.innerHTML='<div class="loading">A carregar favoritos…</div>';const animals=await loadAnimals(profile.favorites||[]);content.innerHTML=cards(animals)}
    async function showLists(){content.innerHTML='<div class="loading">A carregar listas…</div>';const snap=await getDocs(collection(db,'users',user.uid,'lists'));const lists=snap.docs.map(d=>({id:d.id,...d.data()}));if(!lists.length){content.innerHTML='<div class="empty">Ainda não criaste nenhuma lista.</div>';return}const all=await loadAnimals(lists.flatMap(l=>Array.isArray(l.animalIds)?l.animalIds:[]));const map=new Map(all.map(a=>[a.id,a]));content.innerHTML=`<div class="lists-grid">${lists.map(l=>{const ids=Array.isArray(l.animalIds)?l.animalIds:[];const animals=ids.map(id=>map.get(id)).filter(Boolean);return `<article class="list-card"><button class="list-head" type="button" aria-expanded="false"><span class="list-title-wrap"><i class="fa-solid fa-chevron-right list-chevron" aria-hidden="true"></i><h3>${esc(l.name||'Lista sem nome')}</h3></span><span class="badge" aria-label="${animals.length} animais">${animals.length}</span></button><div class="list-body"><div class="list-view-toolbar" aria-label="Disposição dos animais"><button class="view-btn active" data-view="grid" type="button" title="Ver em grelha" aria-label="Ver em grelha"><i class="fa-solid fa-grip"></i></button><button class="view-btn" data-view="list" type="button" title="Ver em lista" aria-label="Ver em lista"><i class="fa-solid fa-list"></i></button></div><div class="list-animals grid-view">${cards(animals)}</div></div></article>`}).join('')}</div>`;content.querySelectorAll('.list-card').forEach(card=>{const head=card.querySelector('.list-head');const animalsWrap=card.querySelector('.list-animals');head.onclick=()=>{const open=card.classList.toggle('open');head.setAttribute('aria-expanded',String(open))};card.querySelectorAll('.view-btn').forEach(button=>button.onclick=()=>{card.querySelectorAll('.view-btn').forEach(btn=>btn.classList.toggle('active',btn===button));animalsWrap.classList.toggle('list-view',button.dataset.view==='list');animalsWrap.classList.toggle('grid-view',button.dataset.view==='grid')})})}
    function normalizeQuality(value){const key=(value||'').toString().trim().toLowerCase();return QUALITY_LEVELS[key]?key:'basico'}
    function getQuality(animal){return normalizeQuality(animal.nivelQualidade||animal.qualidadeRegisto?.nivel||animal.qualidadeRegisto?.id||'basico')}
    function timestampValue(value){if(!value)return 0;if(typeof value==='number')return value;if(typeof value?.toMillis==='function')return value.toMillis();if(value.seconds)return value.seconds*1000;return new Date(value).getTime()||0}
    async function ensurePortfolio(){if(allMyAnimals)return allMyAnimals;const snap=await getDocs(query(collection(db,'animais'),where('criadoPor','==',user.uid)));allMyAnimals=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>timestampValue(b.timestamp)-timestampValue(a.timestamp));return allMyAnimals}
    function renderPortfolioTable(){
      const filtered=activeQuality?allMyAnimals.filter(a=>getQuality(a)===activeQuality):allMyAnimals;
      const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
      portfolioPage=Math.min(Math.max(1,portfolioPage),totalPages);
      const animals=filtered.slice((portfolioPage-1)*PAGE_SIZE,portfolioPage*PAGE_SIZE);
      const count=document.getElementById('portfolioCount');
      const wrap=document.getElementById('portfolioTableWrap');
      if(count)count.textContent=`${filtered.length} animal${filtered.length===1?'':'ais'} · Página ${portfolioPage} de ${totalPages}`;
      if(!wrap)return;
      if(!filtered.length){wrap.innerHTML='<div class="empty">Nenhum animal encontrado para este filtro.</div>';return}
      wrap.innerHTML=`<table class="portfolio-table"><thead><tr><th>Imagem</th><th>Nome</th><th>Nome científico</th><th>Qualidade</th><th>Editar</th></tr></thead><tbody>${animals.map(animal=>{const quality=QUALITY_LEVELS[getQuality(animal)],img=animal.imagemUrl||'';return `<tr><td>${img?`<img class="portfolio-thumb" src="${esc(img)}" alt="${esc(animal.nome||'Animal')}" loading="lazy">`:'<div class="portfolio-thumb"></div>'}</td><td class="portfolio-name">${esc(animal.nome||'Sem nome')}</td><td class="portfolio-scientific">${esc(animal.nomeCientifico||'—')}</td><td><span class="quality-pill"><i class="${quality.className} ${quality.icon}"></i>${quality.label}</span></td><td><a class="edit-btn" href="form/form.html?edit=${encodeURIComponent(animal.id)}&mode=suggestion"><i class="fa-solid fa-pen-to-square"></i> Sugerir edição</a></td></tr>`}).join('')}</tbody></table>${totalPages>1?`<nav class="pagination" aria-label="Paginação">${Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===portfolioPage?'active':''}" data-page="${i+1}" type="button">${i+1}</button>`).join('')}</nav>`:''}`;
      wrap.querySelectorAll('[data-page]').forEach(btn=>btn.onclick=()=>{portfolioPage=Number(btn.dataset.page);renderPortfolioTable();wrap.scrollIntoView({behavior:'smooth',block:'start'})});
    }
    async function showCollaboration(){content.innerHTML='<div class="loading">A carregar colaboração…</div>';await ensurePortfolio();content.innerHTML=`<div class="portfolio-toolbar"><div class="quality-filters" aria-label="Filtrar por qualidade"><button class="filter-btn active" data-quality="" type="button">Todos</button><button class="filter-btn" data-quality="forte" type="button"><i class="fa-solid fa-shield-halved quality-forte"></i> Forte</button><button class="filter-btn" data-quality="melhorar" type="button"><i class="fa-solid fa-wand-magic-sparkles quality-melhorar"></i> Melhorar</button><button class="filter-btn" data-quality="basico" type="button"><i class="fa-solid fa-circle-exclamation quality-basico"></i> Básico</button></div><div class="portfolio-count" id="portfolioCount"></div></div><div class="portfolio-table-wrap" id="portfolioTableWrap"></div>`;activeQuality='';portfolioPage=1;content.querySelectorAll('[data-quality]').forEach(button=>button.addEventListener('click',()=>{activeQuality=button.dataset.quality||'';portfolioPage=1;content.querySelectorAll('[data-quality]').forEach(btn=>btn.classList.toggle('active',btn===button));renderPortfolioTable()}));renderPortfolioTable()}
    async function showContribute(){
      const isCollaborator=String(profile.status||'').toLowerCase()==='on'&&(String(profile.rule||'').toLowerCase()==='colaborador'||String(profile.colaborador||'').toLowerCase()==='on');
      const reqSnap=await getDoc(doc(db,'collaborationRequests',user.uid));
      const request=reqSnap.exists()?reqSnap.data():null;
      if(isCollaborator){content.innerHTML='<div class="collab-request"><i class="fa-solid fa-circle-check"></i><h2>Já és colaborador</h2><p>Podes sugerir alterações diretamente nas páginas dos animais. As sugestões ficam pendentes até aprovação de um administrador.</p><div class="request-status">Acesso ativo</div></div>';return}
      const pending=request?.status==='pending',rejected=request?.status==='rejected';
      content.innerHTML=`<div class="collab-request"><i class="fa-solid fa-handshake-angle"></i><h2>Pedir para ser Colaborador</h2><p>Depois de aprovado por um administrador, poderás sugerir alterações aos animais. Nenhuma sugestão altera diretamente os dados oficiais.</p><button class="request-btn" id="requestCollaboratorBtn" type="button" ${pending?'disabled':''}>${pending?'Pedido pendente':'Pedir para ser Colaborador'}</button><div class="request-status">${pending?'O teu pedido está a aguardar aprovação.':rejected?'O pedido anterior foi recusado. Podes enviar um novo pedido.':''}</div></div>`;
      const btn=document.getElementById('requestCollaboratorBtn');
      if(btn&&!pending)btn.onclick=async()=>{btn.disabled=true;btn.textContent='A enviar…';try{await setDoc(doc(db,'collaborationRequests',user.uid),{userId:user.uid,email:user.email||'',nome:profile.nome||user.displayName||'',status:'pending',requestedAt:serverTimestamp(),updatedAt:serverTimestamp()},{merge:true});btn.textContent='Pedido pendente';content.querySelector('.request-status').textContent='O teu pedido está a aguardar aprovação.'}catch(e){console.error(e);btn.disabled=false;btn.textContent='Tentar novamente';content.querySelector('.request-status').textContent='Não foi possível enviar o pedido.'}};
    }
    async function switchTab(tab){if(tab==='favorites')return showFavorites();if(tab==='lists')return showLists();if(tab==='contribute')return showContribute();return showCollaboration()}
    document.querySelectorAll('.tab').forEach(btn=>btn.onclick=async()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===btn));try{await switchTab(btn.dataset.tab)}catch(e){console.error(e);content.innerHTML='<div class="error">Não foi possível carregar esta secção.</div>'}});
    onAuthStateChanged(auth,async u=>{if(!u){location.href='login.html?redirect='+encodeURIComponent(location.href);return}user=u;try{const snap=await getDoc(doc(db,'users',u.uid));profile=snap.exists()?snap.data():{};profile.favorites=Array.isArray(profile.favorites)?profile.favorites:[];nameEl.textContent=profile.nome||u.displayName||u.email?.split('@')[0]||'Utilizador';const initialTab=new URLSearchParams(location.search).get('tab')||'favorites';const target=document.querySelector(`.tab[data-tab="${initialTab}"]`)||document.querySelector('.tab[data-tab="favorites"]');document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===target));await switchTab(target.dataset.tab)}catch(e){console.error(e);content.innerHTML='<div class="error">Não foi possível carregar o perfil.</div>'}});
  </script>
</body>
</html>
